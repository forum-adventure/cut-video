<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Video Segment Player & Cutter - Ncox Hybrid (Pro Edition - Fixed)</title>
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#121212">
    
    <link rel="manifest" href="data:application/manifest+json;base64,ewogICJzaG9ydF9uYW1lIjogIlZpZGVvUGxheWVyIiwKICAibmFtZSI6ICJWaWRlbyBTZWdtZW50IFBsYXllciIsCiAgImljb25zIjogWwogICAgewogICAgICAic3JjIjogImh0dHBzOi8vY2RuLWljb25zLXBuZy5mbGF0aWNvbi5jb20vNTEyLzcxMS83MTEyNDUucG5nIiwKICAgICAgInR5cGUiOiAiaW1hZ2UvcG5nIiwKICAgICAgInNpemVzIjogIjUxMng1MTIiCiAg|">
    
    <script src="coi-serviceworker.js"></script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            padding: 20px; background-color: #121212; 
            color: #e0e0e0; margin: 0; padding-bottom: 260px; min-height: 100vh;
            display: flex; flex-direction: column;
        }
        #welcomeOverlay {
            position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 0; width: 90%; pointer-events: none;
            transition: opacity 0.5s ease, visibility 0.5s;
        }
        #welcomeOverlay h1 { font-size: 2.5em; color: #ffffff; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
        #welcomeOverlay p { color: #888; font-size: 1.1em; line-height: 1.6; max-width: 600px; margin: 0 auto; }
        body.has-clips #welcomeOverlay { opacity: 0; visibility: hidden; }
        
        #videoContainer { display: flex; flex-direction: column; align-items: center; width: 100%; position: relative; z-index: 2; gap: 25px; }
        
        .clip-wrapper { 
            display: flex; flex-direction: column; align-items: center; 
            border: 1px solid #2a2a2a; padding: 16px; 
            border-radius: 16px; background: #1e1e1e; width: fit-content; 
            max-width: 95%; box-shadow: 0 12px 40px rgba(0,0,0,0.6); 
            height: auto; transition: transform 0.2s ease;
        }

        video { 
            width: auto; height: auto; max-width: 100%; max-height: 45vh; 
            border: 2px solid #333; border-radius: 10px; background: #000; cursor: pointer; display: block;
            aspect-ratio: var(--video-ratio); 
            object-fit: contain; 
        }

        video.portrait { 
            width: 50vw; max-width: 50vw; max-height: 65vh; 
            height: auto; 
        }

        video.unmuted { border-color: #03dac6; box-shadow: 0 0 20px rgba(3, 218, 198, 0.4); }
        
        .clip-title-tag { font-size: 0.95em; color: #fff; font-weight: bold; margin-bottom: 6px; align-self: flex-start; text-overflow: ellipsis; white-space: nowrap; overflow: hidden; max-width: 100%; }
        .clip-info { font-size: 0.85em; color: #999; margin: 8px 0; font-family: monospace; background: #292929; padding: 4px 8px; border-radius: 4px; }
        .button-group { display: flex; gap: 10px; margin-top: 4px; width: 100%; }
        
        .delete-btn, .download-btn { border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.85em; flex: 1; transition: background 0.2s, transform 0.1s; }
        .delete-btn { background-color: #cf6679; color: #000; }
        .delete-btn:active { transform: scale(0.98); }
        .download-btn { background-color: #03dac6; color: #000; }
        .download-btn:not(:disabled):hover { background-color: #01f5dd; }
        .download-btn:active { transform: scale(0.98); }
        
        .controls { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: #1a1a1a; padding: 15px 20px; border-top: 1px solid #2d2d2d; 
            z-index: 1000; display: flex; flex-direction: column; gap: 12px; align-items: center; 
            box-shadow: 0 -8px 24px rgba(0,0,0,0.6); box-sizing: border-box;
        }
        .controls-row { display: flex; gap: 10px; align-items: center; justify-content: center; flex-wrap: wrap; width: 100%; }
        
        input, select { padding: 8px 12px; background: #2d2d2d; color: white; border: 1px solid #444; border-radius: 6px; text-align: center; font-size: 0.9em; outline: none; }
        input:focus { border-color: #03dac6; }
        #startTimeInput { width: 95px; font-family: monospace; font-size: 1em; }
        #durationInput { width: 60px; }
        #clipLabelInput { width: 150px; text-align: left; }
        
        button.action-btn { color: #000; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.9em; transition: background 0.2s; }
        #nextBtn { background-color: #03dac6; }
        #randomBtn { background-color: #bb86fc; }
        .tune-btn { background: #3a3a3a; color: #fff; border: 1px solid #555; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8em; font-weight: bold; }
        .tune-btn:hover { background: #4a4a4a; }
        
        button:disabled { background-color: #444 !important; color: #888 !important; cursor: not-allowed; }

        #gridViewBtn { background-color: #ff9800; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #000; }
        
        #gridOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10,10,10,0.98); z-index: 2000;
            display: none; flex-direction: column; padding: 25px; box-sizing: border-box;
        }
        #gridContent { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); 
            gap: 20px; overflow-y: auto; padding-bottom: 40px;
        }
        .grid-item { 
            cursor: pointer; border: 2px solid #2d2d2d; border-radius: 10px; 
            overflow: hidden; position: relative; background: #000; aspect-ratio: 1 / 1;
            transition: border-color 0.2s;
        }
        .grid-item:hover { border-color: #03dac6; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .grid-item .grid-meta { 
            position: absolute; bottom: 0; left: 0; width: 100%; 
            background: rgba(0,0,0,0.85); font-size: 10px; padding: 4px 0; text-align: center; color: #fff;
            display: flex; flex-direction: column; gap: 2px;
        }
        .grid-meta .grid-label { font-weight: bold; color: #03dac6; text-overflow: ellipsis; white-space: nowrap; overflow: hidden; padding: 0 4px; }
    </style>
</head>
<body>

    <div id="welcomeOverlay">
        <h1 id="mainTitle">Phân Đoạn Video</h1>
        <p id="subTitle">Chọn một tệp video từ máy của bạn để bắt đầu xử lý chuẩn dữ liệu nhanh chóng.</p>
    </div>

    <div id="videoContainer"></div>

    <div id="gridOverlay">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3 style="margin:0; font-size: 1.4em;" id="gridTitle">Danh Sách Phân Đoạn</h3>
            <button id="closeGrid" style="background:#cf6679; border:none; padding:10px 20px; border-radius:6px; font-weight:bold; cursor:pointer; color:#000;">Đóng Lưới</button>
        </div>
        <div id="gridContent"></div>
    </div>

    <div class="controls">
        <div class="controls-row">
            <input type="file" id="videoUpload" accept="video/*">
            <button id="gridViewBtn" title="Xem dạng lưới" disabled>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="margin-right:4px;"><path d="M4 11h5V5H4v6zm0 7h5v-6H4v6zm6 0h5v-6h-5v6zm6 0h5v-6h-5v6zm-6-7h5V5h-5v6zm6-6v6h5V5h-5z"/></svg>
                <span>Lưới</span>
            </button>
        </div>

        <div class="controls-row" style="background: #252525; padding: 8px; border-radius: 8px; gap: 6px;">
            <label style="font-size:0.85em; color:#aaa;">Tinh chỉnh đầu:</label>
            <button class="tune-btn" onclick="adjustTime(-1)">-1s</button>
            <button class="tune-btn" onclick="adjustTime(-0.1)">-0.1s</button>
            <input type="text" id="startTimeInput" value="00:00:00">
            <button class="tune-btn" onclick="adjustTime(0.1)">+0.1s</button>
            <button class="tune-btn" onclick="adjustTime(1)">+1s</button>
        </div>

        <div class="controls-row">
            <label style="font-size:0.9em;">Độ dài (s):</label>
            <input type="number" id="durationInput" value="5" min="1" step="0.5">
            
            <input type="text" id="clipLabelInput" placeholder="Tên phân đoạn (tùy chọn)">
            
            <button id="nextBtn" class="action-btn" disabled>Đang tải Core...</button>
            <button id="randomBtn" class="action-btn" disabled>Random 5s</button>
        </div>
        <p id="status" style="margin:0; font-size: 0.85em; color: #aaa; font-weight: 500;">Đang khởi tạo cấu trúc FFmpeg.wasm...</p>
    </div>
    
    <script>
        const videoContainer = document.getElementById('videoContainer');
        const upload = document.getElementById('videoUpload');
        const nextBtn = document.getElementById('nextBtn');
        const randomBtn = document.getElementById('randomBtn');
        const gridViewBtn = document.getElementById('gridViewBtn');
        const gridOverlay = document.getElementById('gridOverlay');
        const gridContent = document.getElementById('gridContent');
        const status = document.getElementById('status');
        const startTimeInput = document.getElementById('startTimeInput');
        const durationInput = document.getElementById('durationInput');
        const clipLabelInput = document.getElementById('clipLabelInput');

        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ log: true });
        let isFFmpegReady = false;

        let rawVideoFile = null; 
        let sharedVideoURL = null; 
        let totalVideoDuration = 0;
        let currentlyUnmutedVideo = null; 
        let rehydrationTimeout = null;

        async function loadFFmpegCore() {
            try {
                await ffmpeg.load();
                isFFmpegReady = true;
                status.innerText = "Hệ thống Core đã sẵn sàng! Vui lòng chọn Video.";
                if(upload.files[0]) {
                    enableControls();
                }
            } catch (error) {
                console.error(error);
                status.innerText = "Lỗi khởi tạo Core. Hãy đảm bảo chạy bằng GitHub Pages (HTTPS) hoặc Local Server Cross-Origin.";
            }
        }
        loadFFmpegCore();

        durationInput.addEventListener('input', () => {
            const val = durationInput.value || 0;
            randomBtn.innerText = `Random ${val}s`;
        });

        function adjustTime(amount) {
            let currentSeconds = parseTime(startTimeInput.value);
            currentSeconds = Math.max(0, Math.min(totalVideoDuration, currentSeconds + amount));
            startTimeInput.value = formatTime(currentSeconds);
        }

        // Keyboard navigation shortcuts
        window.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName === 'INPUT') return; 
            
            if (e.code === 'Space') {
                e.preventDefault();
                if (currentlyUnmutedVideo) {
                    if (currentlyUnmutedVideo.paused) currentlyUnmutedVideo.play().catch(()=>{});
                    else currentlyUnmutedVideo.pause();
                }
            } else if (e.code === 'ArrowLeft') {
                e.preventDefault();
                adjustTime(-0.1);
            } else if (e.code === 'ArrowRight') {
                e.preventDefault();
                adjustTime(0.1);
            } else if (e.code === 'Enter') {
                e.preventDefault();
                if (!nextBtn.disabled) nextBtn.click();
            }
        });

        const clipObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const video = entry.target;
                if (entry.isIntersecting) {
                    if (video.src && video.src !== "" && video.src !== window.location.href) {
                        if (currentlyUnmutedVideo === video) {
                            video.muted = false;
                            video.classList.add('unmuted');
                        }
                        video.play().catch(() => {});
                    }
                } else {
                    if (currentlyUnmutedVideo === video) return;
                    video.pause();
                    video.muted = true;
                    video.classList.remove('unmuted');
                }
            });
        }, { threshold: 0.1 });

        function handleClipRehydration() {
            if (rehydrationTimeout) clearTimeout(rehydrationTimeout);
            rehydrationTimeout = setTimeout(() => {
                const allWrappers = Array.from(document.querySelectorAll('.clip-wrapper'));
                if (allWrappers.length === 0) return;
                const viewportHeight = window.innerHeight;
                const visibleIndices = allWrappers.map((wrapper, index) => {
                    const rect = wrapper.getBoundingClientRect();
                    return (rect.top < viewportHeight && rect.bottom > 0) ? index : -1;
                }).filter(idx => idx !== -1);
                
                const safeStart = visibleIndices.length > 0 ? Math.max(0, visibleIndices[0] - 3) : 0;
                const safeEnd = visibleIndices.length > 0 ? Math.min(allWrappers.length - 1, visibleIndices[visibleIndices.length - 1] + 3) : allWrappers.length - 1;

                allWrappers.forEach((wrapper, index) => {
                    const video = wrapper.querySelector('video');
                    
                    if (video === currentlyUnmutedVideo) {
                        if (!video.src || video.src === "" || video.src === window.location.href) {
                            video.src = sharedVideoURL;
                            video.currentTime = parseFloat(video.dataset.startTime);
                            video.load();
                        }
                        return;
                    }

                    if (visibleIndices.length > 0 && index >= safeStart && index <= safeEnd) {
                        if (!video.src || video.src === "" || video.src === window.location.href) {
                            video.src = sharedVideoURL;
                            video.currentTime = parseFloat(video.dataset.startTime);
                            video.load();
                        }
                    } else {
                        if (video.src && video.src !== "" && video.src !== window.location.href) {
                            video.pause(); video.src = ""; video.load(); 
                        }
                    }
                });
            }, 250);
        }

        window.addEventListener('scroll', handleClipRehydration, { passive: true });

        function setFocusAudio(videoElement) {
            if (currentlyUnmutedVideo && currentlyUnmutedVideo !== videoElement) {
                currentlyUnmutedVideo.muted = true;
                currentlyUnmutedVideo.classList.remove('unmuted');
            }
            videoElement.muted = false;
            videoElement.classList.add('unmuted');
            currentlyUnmutedVideo = videoElement;
        }

        function enableControls() {
            if (isFFmpegReady && sharedVideoURL) {
                nextBtn.disabled = false;
                randomBtn.disabled = false;
                gridViewBtn.disabled = false;
                nextBtn.innerText = "Thêm đoạn";
            }
        }

        upload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                rawVideoFile = file; 
                if (sharedVideoURL) URL.revokeObjectURL(sharedVideoURL); 
                sharedVideoURL = URL.createObjectURL(file);
                const tempVideo = document.createElement('video');
                tempVideo.src = sharedVideoURL;
                tempVideo.onloadedmetadata = () => {
                    totalVideoDuration = tempVideo.duration;
                    
                    videoContainer.innerHTML = ""; 
                    gridContent.innerHTML = "";
                    document.body.classList.remove('has-clips');
                    
                    document.getElementById('mainTitle').innerText = "Video định dạng sẵn sàng";
                    document.getElementById('subTitle').innerHTML = "💡 Thiết lập mốc thời gian bắt đầu, gán nhãn rồi nhấn <b>Thêm đoạn</b>.";
                    
                    status.innerText = `Thời lượng video: ${formatTime(totalVideoDuration)}`;
                    enableControls();
                };
            }
        });

        async function captureThumbnail(startTime) {
            return new Promise((resolve) => {
                const canvas = document.createElement('canvas');
                const v = document.createElement('video');
                v.src = sharedVideoURL;
                v.currentTime = startTime;
                v.muted = true;
                v.playsInline = true;
                
                v.onseeked = () => {
                    canvas.width = 160; canvas.height = 160;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(v, 0, 0, canvas.width, canvas.height);
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
                    
                    v.src = "";
                    v.load();
                    v.remove();
                    resolve(dataUrl);
                };
                v.onerror = () => {
                    v.src = ""; v.remove(); resolve("");
                };
            });
        }

        function addGridItemAhead(clipId, startTime, labelText) {
            const gridItem = document.createElement('div');
            gridItem.className = 'grid-item';
            gridItem.setAttribute('data-grid-id', clipId);
            
            const img = document.createElement('img');
            img.alt = "Thumbnail";
            gridItem.appendChild(img);
            
            const metaContainer = document.createElement('div');
            metaContainer.className = 'grid-meta';
            
            if(labelText) {
                const labelSpan = document.createElement('span');
                labelSpan.className = 'grid-label';
                labelSpan.innerText = labelText;
                metaContainer.appendChild(labelSpan);
            }
            
            const timeSpan = document.createElement('span');
            timeSpan.innerText = formatTime(startTime);
            metaContainer.appendChild(timeSpan);
            
            gridItem.appendChild(metaContainer);
            
            gridItem.onclick = () => {
                gridOverlay.style.display = 'none';
                const targetWrapper = document.getElementById(clipId);
                if (!targetWrapper) return;
                const targetVideo = targetWrapper.querySelector('video');
                targetWrapper.scrollIntoView({ behavior: 'smooth', block: 'center' });
                setTimeout(() => {
                    if (!targetVideo.src || targetVideo.src === "" || targetVideo.src === window.location.href) {
                        targetVideo.src = sharedVideoURL;
                        targetVideo.currentTime = startTime;
                        targetVideo.load();
                    }
                    setFocusAudio(targetVideo);
                    targetVideo.play().catch(() => {});
                }, 400);
            };
            
            gridContent.appendChild(gridItem);

            captureThumbnail(startTime).then(thumbUrl => {
                if (thumbUrl) img.src = thumbUrl;
            });
        }

        nextBtn.addEventListener('click', () => {
            if (!sharedVideoURL) return;
            const start = parseTime(startTimeInput.value);
            const duration = parseFloat(durationInput.value) || 5;
            const clipLabel = clipLabelInput.value.trim();

            if (start >= totalVideoDuration) {
                alert("Thời gian bắt đầu vượt quá tổng độ dài video!");
                return;
            }
            document.body.classList.add('has-clips');
            const end = Math.min(start + duration, totalVideoDuration);
            const clipId = "clip-" + Date.now();
            
            const wrapper = document.createElement('div');
            wrapper.className = 'clip-wrapper';
            wrapper.id = clipId;
            
            if(clipLabel) {
                const titleTag = document.createElement('div');
                titleTag.className = 'clip-title-tag';
                titleTag.innerText = `🏷️ ${clipLabel}`;
                wrapper.appendChild(titleTag);
            }
            
            // FIX CHÍNH: Đồng bộ cơ chế khởi tạo an toàn từ bản v1
            const video = document.createElement('video');
            video.muted = true; 
            video.playsInline = true; 
            video.preload = "metadata"; 
            video.src = sharedVideoURL;
            video.dataset.startTime = start;
            video.dataset.label = clipLabel;
            video.dataset.isInitialLoad = "true";
            
            video.onclick = () => {
                if (video.muted) setFocusAudio(video);
                else { video.muted = true; video.classList.remove('unmuted'); currentlyUnmutedVideo = null; }
            };
            
            let animationFrameId;
            const checkTime = () => {
                if (video.currentTime >= end) { 
                    video.currentTime = start; 
                    video.play().catch(()=>{});
                }
                if (!video.paused) animationFrameId = requestAnimationFrame(checkTime);
            };

            video.onplay = () => animationFrameId = requestAnimationFrame(checkTime);
            video.onpause = () => cancelAnimationFrame(animationFrameId);
            
            video.onloadedmetadata = () => {
                const width = video.videoWidth;
                const height = video.videoHeight;
                video.style.setProperty('--video-ratio', `${width} / ${height}`);
                if (height > width) video.classList.add('portrait');
                video.currentTime = start;
            };
            
            // FIX CHÍNH: Chỉ kích hoạt chạy mượt sau khi dữ liệu phân cảnh load xong hoàn toàn (onloadeddata)
            video.onloadeddata = () => { 
                if (video.dataset.isInitialLoad === "true") {
                    wrapper.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    setFocusAudio(video);
                    video.dataset.isInitialLoad = "false";
                }
                video.play().catch(() => {});
            };
            
            const info = document.createElement('div');
            info.className = 'clip-info';
            info.innerText = `${formatTime(start)} - ${formatTime(end)} (${(end - start).toFixed(1)}s)`;
            
            const btnGroup = document.createElement('div');
            btnGroup.className = 'button-group';
            
            const dl = document.createElement('button');
            dl.className = 'download-btn'; dl.innerText = "Tải Xuống .MP4";
            dl.onclick = () => downloadClipFFmpeg(start, (end - start), clipLabel, dl);
            
            const del = document.createElement('button');
            del.className = 'delete-btn'; del.innerText = "Xóa Đoạn";
            del.onclick = () => {
                clipObserver.unobserve(video); wrapper.remove();
                const gridItem = document.querySelector(`[data-grid-id="${clipId}"]`);
                if (gridItem) gridItem.remove(); 
                if (videoContainer.children.length === 0) document.body.classList.remove('has-clips');
                handleClipRehydration();
            };
            
            btnGroup.appendChild(dl); btnGroup.appendChild(del);
            wrapper.appendChild(video); wrapper.appendChild(info); wrapper.appendChild(btnGroup);
            videoContainer.appendChild(wrapper);
            
            clipObserver.observe(video);
            
            // FIX: Trì hoãn xử lý luồng tạo Thumbnail để tránh nghẽn phần cứng giải mã (Decoder)
            setTimeout(() => {
                addGridItemAhead(clipId, start, clipLabel);
            }, 120);
            
            startTimeInput.value = formatTime(end);
            clipLabelInput.value = ""; 
            handleClipRehydration();
        });

        gridViewBtn.onclick = () => {
            gridOverlay.style.display = 'flex';
        };

        document.getElementById('closeGrid').onclick = () => gridOverlay.style.display = 'none';

        async function downloadClipFFmpeg(startTime, duration, labelText, btn) {
            if (!isFFmpegReady) {
                alert("Hệ thống FFmpeg core đang tải, vui lòng thử lại sau vài giây!");
                return;
            }
            if (!rawVideoFile) {
                alert("Lỗi: Không tìm thấy file video đầu vào.");
                return;
            }

            const originalBtnText = btn.innerText;
            btn.disabled = true;
            btn.innerText = '⌛ Đang xử lý...';
            status.innerText = `⏳ Thực thi trích xuất đoạn [${formatTime(startTime)}] độ dài ${duration}s...`;

            const timestamp = Date.now();
            const cleanFileName = rawVideoFile.name.replace(/\s+/g, '_');
            const virtualInputName = `input_${timestamp}_${cleanFileName}`;
            const outputName = `cut_${timestamp}.mp4`;

            try {
                ffmpeg.FS('writeFile', virtualInputName, await fetchFile(rawVideoFile));
                
                await ffmpeg.run('-ss', startTime.toString(), '-i', virtualInputName, '-t', duration.toString(), '-c', 'copy', outputName);
                
                const data = ffmpeg.FS('readFile', outputName);
                const videoUrl = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
                
                const suffix = labelText ? `_${labelText.replace(/[^a-zA-Z0-9]/g, '_')}` : '';
                const downloadName = `clip_${formatTime(startTime).replace(/:/g, '-')}${suffix}.mp4`;
                
                const a = document.createElement('a');
                a.href = videoUrl;
                a.download = downloadName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                try { ffmpeg.FS('unlink', outputName); } catch(e){}
                status.innerText = `✨ Trích xuất thành công: ${downloadName}`;
            } catch (err) {
                console.error(err);
                alert("Có lỗi xảy ra trong quá trình xử lý dòng lệnh FFmpeg.");
                status.innerText = "❌ Lỗi thực thi Render.";
            } finally {
                btn.disabled = false;
                btn.innerText = originalBtnText;
                try { ffmpeg.FS('unlink', virtualInputName); } catch(e){}
            }
        }

        randomBtn.onclick = () => {
            const d = parseFloat(durationInput.value) || 5;
            const maxRange = Math.max(0, totalVideoDuration - d);
            startTimeInput.value = formatTime(Math.random() * maxRange);
            nextBtn.click();
        };

        function formatTime(s) {
            const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = Math.floor(s % 60);
            return [h, m, sec].map(v => String(v).padStart(2, '0')).join(':');
        }
        
        function parseTime(t) {
            const p = t.replace(/[^0-9:]/g, '').split(':').reverse();
            let seconds = 0;
            if (p[0]) seconds += parseInt(p[0]) || 0;     
            if (p[1]) seconds += (parseInt(p[1]) || 0) * 60; 
            if (p[2]) seconds += (parseInt(p[2]) || 0) * 3600; 
            return seconds;
        }
    </script>
</body>
