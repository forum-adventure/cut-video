    <style>
        body { 
            font-family: sans-serif; padding: 20px; background-color: #121212; 
            color: #e0e0e0; margin: 0; padding-bottom: 220px; min-height: 100vh;
            display: flex; flex-direction: column;
        }
        #welcomeOverlay {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 10; width: 90%; max-width: 600px;
            pointer-events: auto; cursor: pointer;
            transition: opacity 0.5s ease, visibility 0.5s, transform 0.2s, border-color 0.2s;
            border: 2px dashed #444; padding: 40px 20px; border-radius: 16px;
            background: rgba(30, 30, 30, 0.3);
        }
        #welcomeOverlay.dragover {
            border-color: #03dac6;
            background: rgba(3, 218, 198, 0.05);
            transform: translate(-50%, -50%) scale(1.02);
        }
        #welcomeOverlay h1 { font-size: 3em; color: #ffffff; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 3px; pointer-events: none; }
        #welcomeOverlay p { color: #888; font-size: 1.2em; line-height: 1.6; max-width: 600px; margin: 0 auto; pointer-events: none; }
        body.has-clips #welcomeOverlay { opacity: 0; visibility: hidden; pointer-events: none; }
        #videoContainer { display: flex; flex-direction: column; align-items: center; width: 100%; position: relative; z-index: 2; }
        
        .clip-wrapper { 
            display: flex; flex-direction: column; align-items: center; 
            margin-bottom: 30px; border: 1px solid #333; padding: 12px; 
            border-radius: 12px; background: #1e1e1e; width: fit-content; 
            max-width: 95%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }

        .video-container-box {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #444;
            box-sizing: border-box;
            width: 75vw;
            max-width: 640px; 
            height: auto;
            aspect-ratio: var(--aspect-ratio, 16/9); 
        }
        
        .video-container-box.portrait { 
            width: 55vw; 
            max-width: 380px;
            height: auto;
        }

        .video-container-box.unmuted { 
            border-color: #03dac6; 
            box-shadow: 0 0 15px rgba(3, 218, 198, 0.5); 
        }

        video { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            cursor: pointer; 
            display: block;
        }

        .clip-info { font-size: 0.8em; color: #777; margin: 8px 0 5px 0; font-family: monospace; }
        .button-group { display: flex; gap: 8px; margin-top: 8px; }
        .delete-btn, .download-btn { border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.85em; }
        .delete-btn { background-color: #cf6679; color: #000; }
        .download-btn { background-color: #03dac6; color: #000; transition: background-color 0.2s; }
        .download-btn:disabled { background-color: #555 !important; color: #aaa; cursor: not-allowed; }
        
        .controls { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: #252525; padding: 15px; border-top: 1px solid #444; 
            z-index: 1000; display: flex; flex-direction: column; gap: 10px; align-items: center; 
            box-shadow: 0 -4px 10px rgba(0,0,0,0.5); box-sizing: border-box;
        }
        .controls-row { display: flex; gap: 10px; align-items: center; justify-content: center; flex-wrap: wrap; width: 100%; }
        input { padding: 8px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; text-align: center; }
        #startTimeInput { width: 85px; }
        #durationInput { width: 55px; }
        #nextBtn, #randomBtn { color: #000; border: none; padding: 8px 16px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        #nextBtn { background-color: #03dac6; }
        #randomBtn { background-color: #bb86fc; }
        button:disabled { background-color: #555 !important; color: #aaa; cursor: not-allowed; }

        #gridViewBtn { background-color: #ff9800; border: none; padding: 8px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; }
        #gridOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000;
            display: none; flex-direction: column; padding: 20px; box-sizing: border-box;
        }
        #gridContent { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); 
            gap: 15px; overflow-y: auto; padding-bottom: 40px;
        }
        .grid-item { 
            cursor: pointer; border: 2px solid #333; border-radius: 8px; 
            overflow: hidden; position: relative; background: #000; aspect-ratio: 1 / 1;
        }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .grid-item span { 
            position: absolute; bottom: 0; left: 0; width: 100%; 
            background: rgba(0,0,0,0.7); font-size: 10px; padding: 2px 0; text-align: center; color: #fff;
        }
    
    /* Thêm vào cuối thẻ <style> của bạn */
body.snap-enabled {
    scroll-snap-type: y mandatory;
}
.clip-wrapper.snap-target {
    scroll-snap-align: center;
}

<body>

    <div id="welcomeOverlay">
        <h1 id="mainTitle">Tải video lên</h1>
        <p id="subTitle">Chọn một tệp video hoặc kéo thả vào đây để bắt đầu phân đoạn.</p>
    </div>

    <div id="videoContainer"></div>

    <div id="gridOverlay">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3 style="margin:0" id="gridTitle">Danh sách đoạn</h3>
            <button id="closeGrid" style="background:#cf6679; border:none; padding:8px 15px; border-radius:4px; font-weight:bold; cursor:pointer">Đóng</button>
        </div>
        <div id="gridContent"></div>
    </div>

    <div class="controls">
        <div class="controls-row">
            <input type="file" id="videoUpload" accept="video/*">
            <button id="gridViewBtn" title="Xem dạng lưới" disabled>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M4 11h5V5H4v6zm0 7h5v-6H4v6zm6 0h5v-6h-5v6zm6 0h5v-6h-5v6zm-6-7h5V5h-5v6zm6-6v6h5V5h-5z"/></svg>
            </button>
        </div>

        <div class="controls-row">
            <label>Bắt đầu:</label>
            <input type="text" id="startTimeInput" value="00:00:00">
            <label>Dài (s):</label>
            <input type="number" id="durationInput" value="5" min="1">
            <button id="nextBtn" disabled>Đang tải Core...</button>
            <button id="randomBtn" disabled>Random 5s</button>
        </div>
        <p id="status" style="margin:0; font-size: 0.85em; color: #888;">Đang khởi tạo FFmpeg.wasm...</p>
    </div>
    
    <script>
        const videoContainer = document.getElementById('videoContainer');
        const upload = document.getElementById('videoUpload');
        const nextBtn = document.getElementById('nextBtn');
        const randomBtn = document.getElementById('randomBtn');
        const gridViewBtn = document.getElementById('gridViewBtn');
        const gridOverlay = document.getElementById('gridOverlay');
        const gridContent = document.getElementById('gridContent');
        const status = document.getElementById('status');
        const startTimeInput = document.getElementById('startTimeInput');
        const durationInput = document.getElementById('durationInput');
        const welcomeOverlay = document.getElementById('welcomeOverlay');

        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ log: true });
        let isFFmpegReady = false;

        let rawVideoFile = null; 
        let sharedVideoURL = null; 
        let totalVideoDuration = 0;
        let currentlyUnmutedVideo = null; 
        let rehydrationTimeout = null;
        let isLockRehydration = false; 

        async function loadFFmpegCore() {
            try {
                await ffmpeg.load();
                isFFmpegReady = true;
                status.innerText = "Chưa có video được chọn. Hệ thống core sẵn sàng!";
                if(upload.files[0]) {
                    enableControls();
                }
            } catch (error) {
                console.error(error);
                status.innerText = "Lỗi khởi tạo Core. Hãy đảm bảo chạy bằng GitHub Pages hoặc Local Server.";
            }
        }
        loadFFmpegCore();

        durationInput.addEventListener('input', () => {
            const val = durationInput.value || 0;
            randomBtn.innerText = `Random ${val}s`;
        });

        const clipObserver = new IntersectionObserver((entries) => {
            if (isLockRehydration) return; 
            entries.forEach(entry => {
                const video = entry.target;
                if (entry.isIntersecting) {
                    if (video.src && video.src !== "" && video.src !== window.location.href) {
                        video.play().catch(() => {});
                    }
                } else {
                    video.pause();
                    if (currentlyUnmutedVideo !== video) {
                        video.muted = true;
                        const parentBox = video.closest('.video-container-box');
                        if (parentBox) parentBox.classList.remove('unmuted');
                    }
                }
            });
        }, { threshold: 0.1 });

        function handleClipRehydration() {
            if (isLockRehydration) return;
            if (rehydrationTimeout) clearTimeout(rehydrationTimeout);
            rehydrationTimeout = setTimeout(() => {
                const allWrappers = Array.from(document.querySelectorAll('.clip-wrapper'));
                if (allWrappers.length === 0) return;
                
                const viewportHeight = window.innerHeight;
                const visibleIndices = allWrappers.map((wrapper, index) => {
                    const rect = wrapper.getBoundingClientRect();
                    return (rect.top < viewportHeight && rect.bottom > 0) ? index : -1;
                }).filter(idx => idx !== -1);
                
                const safeStart = visibleIndices.length > 0 ? Math.max(0, visibleIndices[0] - 3) : 0;
                const safeEnd = visibleIndices.length > 0 ? Math.min(allWrappers.length - 1, visibleIndices[visibleIndices.length - 1] + 3) : allWrappers.length - 1;

                allWrappers.forEach((wrapper, index) => {
                    const video = wrapper.querySelector('video');
                    
                    if ((visibleIndices.length > 0 && index >= safeStart && index <= safeEnd) || video === currentlyUnmutedVideo) {
                        if (!video.src || video.src === "" || video.src === window.location.href) {
                            video.src = sharedVideoURL;
                            video.currentTime = parseFloat(video.dataset.startTime);
                            video.load();
                        }
                    } else {
                        if (video.src && video.src !== "" && video.src !== window.location.href) {
                            video.pause(); 
                            video.src = ""; 
                            video.load(); 
                        }
                    }
                });
            }, 250);
        }

        window.addEventListener('scroll', handleClipRehydration, { passive: true });

        function setFocusAudio(videoElement) {
            if (currentlyUnmutedVideo && currentlyUnmutedVideo !== videoElement) {
                currentlyUnmutedVideo.muted = true;
                const oldBox = currentlyUnmutedVideo.closest('.video-container-box');
                if (oldBox) oldBox.classList.remove('unmuted');
            }
            videoElement.muted = false;
            const newBox = videoElement.closest('.video-container-box');
            if (newBox) newBox.classList.add('unmuted');
            currentlyUnmutedVideo = videoElement;
        }

        function enableControls() {
            if (isFFmpegReady && sharedVideoURL) {
                nextBtn.disabled = false;
                randomBtn.disabled = false;
                gridViewBtn.disabled = false;
                nextBtn.innerText = "Thêm đoạn";
            }
        }

        function processVideoFile(file) {
            if (!file) return;
            rawVideoFile = file; 
            if (sharedVideoURL) URL.revokeObjectURL(sharedVideoURL); 
            sharedVideoURL = URL.createObjectURL(file);
            const tempVideo = document.createElement('video');
            tempVideo.src = sharedVideoURL;
            tempVideo.onloadedmetadata = () => {
                totalVideoDuration = tempVideo.duration;
                
                // ĐÃ SỬA: Trước khi xóa Grid, thu hồi toàn bộ Blob URL thumbnail cũ để giải phóng RAM
                gridContent.querySelectorAll('img').forEach(img => {
                    if (img.src && img.src.startsWith('blob:')) URL.revokeObjectURL(img.src);
                });

                videoContainer.innerHTML = ""; 
                gridContent.innerHTML = "";
                document.body.classList.remove('has-clips');
                
                document.getElementById('mainTitle').innerText = "Video đã sẵn sàng";
                document.getElementById('subTitle').innerHTML = "💡 Nhấn <b>Thêm đoạn</b> hoặc <b>Random</b> để bắt đầu.";
                
                status.innerText = `Sẵn sàng: ${formatTime(totalVideoDuration)}`;
                enableControls();
                
                tempVideo.src = "";
                tempVideo.load();
            };
        }

        upload.addEventListener('change', (e) => {
            processVideoFile(e.target.files[0]);
        });

        welcomeOverlay.addEventListener('click', () => {
            upload.click();
        });

        welcomeOverlay.addEventListener('dragover', (e) => {
            e.preventDefault();
            welcomeOverlay.classList.add('dragover');
        });

        welcomeOverlay.addEventListener('dragleave', () => {
            welcomeOverlay.classList.remove('dragover');
        });

        welcomeOverlay.addEventListener('drop', (e) => {
            e.preventDefault();
            welcomeOverlay.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].type.startsWith('video/')) {
                upload.files = files; 
                processVideoFile(files[0]);
            }
        });

        async function captureThumbnail(startTime) {
            return new Promise((resolve) => {
                const canvas = document.createElement('canvas');
                const v = document.createElement('video');
                v.src = sharedVideoURL;
                v.currentTime = startTime;
                v.muted = true;
                v.playsInline = true;
                
                v.onseeked = () => {
                    canvas.width = 160; canvas.height = 160;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(v, 0, 0, canvas.width, canvas.height);
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
                    
                    v.src = "";
                    v.load();
                    v.remove();
                    resolve(dataUrl);
                };
                v.onerror = () => {
                    v.src = ""; v.load(); v.remove(); resolve("");
                };
            });
        }

        function addGridItemAhead(clipId, startTime) {
            const gridItem = document.createElement('div');
            gridItem.className = 'grid-item';
            gridItem.setAttribute('data-grid-id', clipId);
            
            const img = document.createElement('img');
            img.alt = "...";
            gridItem.appendChild(img);
            
            const span = document.createElement('span');
            span.innerText = formatTime(startTime);
            gridItem.appendChild(span);
            
            // ==================== THÊM BIẾN TOÀN CỤC MỚI KHỞI TẠO ====================
let isSnapLocked = false;

// Hàm để tắt chế độ Snap Lock khi người dùng tương tác tay
function unlockSnap() {
    if (!isSnapLocked) return;
    isSnapLocked = false;
    isLockRehydration = false;
    document.body.classList.remove('snap-enabled');
    
    // Gỡ bỏ class ghim của các clip
    document.querySelectorAll('.clip-wrapper.snap-target').forEach(w => {
        wrapper.classList.remove('snap-target');
    });
    
    // Gỡ sự kiện để tránh lặp lại vô ích
    window.removeEventListener('touchstart', unlockSnap);
    window.removeEventListener('pointerdown', unlockSnap);
    window.removeEventListener('wheel', unlockSnap);
    
    // Gọi lại cập nhật hydration cho chuẩn xác sau khi mở khóa
    handleClipRehydration();
}
// =========================================================================

function addGridItemAhead(clipId, startTime) {
    const gridItem = document.createElement('div');
    gridItem.className = 'grid-item';
    gridItem.setAttribute('data-grid-id', clipId);
    
    const img = document.createElement('img');
    img.alt = "...";
    gridItem.appendChild(img);
    
    const span = document.createElement('span');
    span.innerText = formatTime(startTime);
    gridItem.appendChild(span);
    
    // --- ĐÃ TỐI ƯU HÓA SỰ KIỆN CLICK ĐỂ GHIM CỐ ĐỊNH (SNAP LOCK) ---
    gridItem.onclick = () => {
        gridOverlay.style.display = 'none';
        const targetWrapper = document.getElementById(clipId);
        if (!targetWrapper) return;
        const targetVideo = targetWrapper.querySelector('video');
        
        // 1. Kích hoạt trạng thái khóa hệ thống rehydration tạm thời
        isLockRehydration = true;
        isSnapLocked = true;
        
        // 2. Kích hoạt CSS Snap để ép trình duyệt ghim cứng video vào giữa màn hình
        document.body.classList.add('snap-enabled');
        targetWrapper.classList.add('snap-target');

        // 3. Nạp nhanh nguồn video nếu chưa có sẵn 
        if (!targetVideo.src || targetVideo.src === "" || targetVideo.src === window.location.href) {
            targetVideo.src = sharedVideoURL;
            targetVideo.currentTime = startTime;
            targetVideo.load();
        }

        // 4. Cuộn màn hình đến mục tiêu
        targetWrapper.scrollIntoView({ behavior: 'smooth', block: 'center' });
        
        // 5. Lắng nghe hành vi chạm/cuộn của người dùng để hủy Snap lập tức
        window.addEventListener('touchstart', unlockSnap, { passive: true });
        window.addEventListener('pointerdown', unlockSnap, { passive: true });
        window.addEventListener('wheel', unlockSnap, { passive: true });

        // 6. Phát video sau khi hiệu ứng cuộn tương đối ổn định
        setTimeout(() => {
            targetVideo.muted = true; 
            targetVideo.play().then(() => {
                setFocusAudio(targetVideo);
            }).catch(err => {
                console.log("Autoplay giới hạn.");
            });
            
            // Nếu người dùng chưa chạm màn hình, giữ trạng thái khóa an toàn, chỉ cập nhật nhẹ vùng hiển thị
            if (isSnapLocked) {
                // Tạm thời kích hoạt thủ công tài nguyên cho các clip lân cận mà không phá vỡ vị trí cuộn
                const viewportHeight = window.innerHeight;
                const allWrappers = Array.from(document.querySelectorAll('.clip-wrapper'));
                const currentIndex = allWrappers.indexOf(targetWrapper);
                if (currentIndex !== -1) {
                    const safeStart = Math.max(0, currentIndex - 2);
                    const safeEnd = Math.min(allWrappers.length - 1, currentIndex + 2);
                    allWrappers.forEach((w, idx) => {
                        const v = w.querySelector('video');
                        if (idx >= safeStart && idx <= safeEnd) {
                            if (!v.src || v.src === "" || v.src === window.location.href) {
                                v.src = sharedVideoURL; v.currentTime = parseFloat(v.dataset.startTime); v.load();
                            }
                        }
                    });
                }
            }
        }, 400);
    };
    
    gridContent.appendChild(gridItem);

    captureThumbnail(startTime).then(thumbUrl => {
        if (thumbUrl) img.src = thumbUrl;
    });
}


        nextBtn.addEventListener('click', () => {
            if (!sharedVideoURL) return;
            const start = parseTime(startTimeInput.value);
            const duration = parseFloat(durationInput.value) || 5;
            if (start >= totalVideoDuration) {
                alert("Thời gian bắt đầu vượt quá độ dài video!");
                return;
            }
            document.body.classList.add('has-clips');
            const end = Math.min(start + duration, totalVideoDuration);
            const clipId = "clip-" + Date.now();
            
            const wrapper = document.createElement('div');
            wrapper.className = 'clip-wrapper';
            wrapper.id = clipId;
            
            const videoBox = document.createElement('div');
            videoBox.className = 'video-container-box';
            
            const video = document.createElement('video');
            video.playsInline = true; 
            video.preload = "auto"; 
            video.src = sharedVideoURL;
            video.dataset.startTime = start;
            
            videoBox.appendChild(video);
            setFocusAudio(video);
            
            video.onclick = () => {
                if (video.muted) setFocusAudio(video);
                else { 
                    video.muted = true; 
                    if (videoBox) videoBox.classList.remove('unmuted'); 
                    currentlyUnmutedVideo = null; 
                }
            };
            
            let animationFrameId;
            const checkTime = () => {
                // ĐÃ SỬA: Sửa lại điều kiện `>= end - 0.1` hoặc kiểm tra video kết thúc để tránh lỗi kẹt ở giây cuối cùng của video gốc
                if (video.currentTime >= end - 0.1 || video.ended) { 
                    video.currentTime = start; 
                    video.play().catch(()=>{}); 
                }
                if (!video.paused) animationFrameId = requestAnimationFrame(checkTime);
            };
            video.onplay = () => animationFrameId = requestAnimationFrame(checkTime);
            video.onpause = () => cancelAnimationFrame(animationFrameId);
            
            video.onloadedmetadata = () => {
                videoBox.style.setProperty('--aspect-ratio', `${video.videoWidth}/${video.videoHeight}`);

                if (video.videoHeight > video.videoWidth) {
                    videoBox.classList.add('portrait');
                }
                
                video.currentTime = start;

                const allWrappers = videoContainer.querySelectorAll('.clip-wrapper');
                if (allWrappers.length > 0 && allWrappers[allWrappers.length - 1] === wrapper) {
                    setTimeout(() => {
                        wrapper.scrollIntoView({
                            behavior: 'smooth',
                            block: 'center'
                        });
                    }, 100);
                }
            };

            video.onseeked = () => {
                video.play().catch(() => {});
            };
            
            const info = document.createElement('div');
            info.className = 'clip-info';
            info.innerText = `${formatTime(start)} - ${formatTime(end)}`;
            const btnGroup = document.createElement('div');
            btnGroup.className = 'button-group';
            
            const dl = document.createElement('button');
            dl.className = 'download-btn'; dl.innerText = "Tải xuống (.MP4)";
            dl.onclick = () => downloadClipFFmpeg(start, duration, dl);
            
            const del = document.createElement('button');
            del.className = 'delete-btn'; del.innerText = "Xóa clip";
            del.onclick = () => {
                clipObserver.unobserve(video); 
                
                // ĐÃ SỬA: Thu hồi Blob URL của thumbnail trong grid trước khi xóa để giải phóng RAM triệt để
                const gridItem = document.querySelector(`[data-grid-id="${clipId}"]`);
                if (gridItem) {
                    const gridImg = gridItem.querySelector('img');
                    if (gridImg && gridImg.src.startsWith('blob:')) URL.revokeObjectURL(gridImg.src);
                    gridItem.remove(); 
                }
                
                // ĐÃ SỬA: Nếu video đang xóa là video đang được bật tiếng, xóa trạng thái toàn cục
                if (currentlyUnmutedVideo === video) currentlyUnmutedVideo = null;
                
                wrapper.remove();
                if (videoContainer.children.length === 0) document.body.classList.remove('has-clips');
                handleClipRehydration();
            };
            
            btnGroup.appendChild(dl); btnGroup.appendChild(del);
            
            wrapper.appendChild(videoBox); 
            wrapper.appendChild(info); 
            wrapper.appendChild(btnGroup);
            videoContainer.appendChild(wrapper);
            
            clipObserver.observe(video);
            addGridItemAhead(clipId, start);
            
            startTimeInput.value = formatTime(end);
            wrapper.scrollIntoView({ behavior: 'smooth', block: 'center' });
            
            handleClipRehydration();
        });

        gridViewBtn.onclick = () => {
            gridOverlay.style.display = 'flex';
        };

        document.getElementById('closeGrid').onclick = () => gridOverlay.style.display = 'none';

        async function downloadClipFFmpeg(startTime, duration, btn) {
            if (!isFFmpegReady) {
                alert("Hệ thống xử lý video chưa sẵn sàng, vui lòng đợi một chút!");
                return;
            }
            if (!rawVideoFile) {
                alert("Không tìm thấy file video gốc!");
                return;
            }

            const originalBtnText = btn.innerText;
            btn.disabled = true;
            btn.innerText = '⌛ Đang trích xuất...';
            status.innerText = `⏳ Hệ thống FFmpeg đang cắt đoạn [${formatTime(startTime)}] độ dài ${duration}s...`;

            try {
                const { name } = rawVideoFile;
                ffmpeg.FS('writeFile', name, await fetchFile(rawVideoFile));
                const outputName = `cut_${Date.now()}.mp4`;
                
                await ffmpeg.run('-ss', startTime.toString(), '-i', name, '-t', duration.toString(), '-vcodec', 'libx264', '-acodec', 'aac', '-preset', 'fast', outputName);
                const data = ffmpeg.FS('readFile', outputName);
                const videoUrl = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
                
                const cleanTime = formatTime(startTime).replace(/:/g, '-');
                const a = document.createElement('a');
                a.href = videoUrl;
                a.download = `clip_${cleanTime}.mp4`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                try { ffmpeg.FS('unlink', outputName); } catch(e){}
                status.innerText = `✨ Xuất thành công đoạn từ ${formatTime(startTime)}!`;
            } catch (err) {
                console.error(err);
                alert("Có lỗi xảy ra trong quá trình trích xuất bằng FFmpeg.");
                status.innerText = "❌ Lỗi trích xuất clip.";
            } finally {
                btn.disabled = false;
                btn.innerText = originalBtnText;
                try { ffmpeg.FS('unlink', name); } catch(e){}
            }
        }

        randomBtn.onclick = () => {
            const d = parseFloat(durationInput.value) || 5;
            const maxRange = Math.max(0, totalVideoDuration - d);
            // ĐÃ SỬA: Bọc thêm Math.floor để chuyển số giây ngẫu nhiên thành số nguyên trước khi format chuỗi thời gian
            startTimeInput.value = formatTime(Math.floor(Math.random() * maxRange));
            nextBtn.click();
        };

        function formatTime(s) {
            const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = Math.floor(s % 60);
            return [h, m, sec].map(v => String(v).padStart(2, '0')).join(':');
        }
        function parseTime(t) {
            const p = t.replace(/[^0-9:]/g, '').split(':').reverse();
            return (parseInt(p[0]) || 0) + (parseInt(p[1]) || 0) * 60 + (parseInt(p[2]) || 0) * 3600;
        }
    </script>
