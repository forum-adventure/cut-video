    <style>
    /* --- GIAO DIỆN MÀN HÌNH LOADING TOÀN MÀN HÌNH --- */
    #ffmpegLoadingOverlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #121212;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.5s ease, visibility 0.5s ease;

    .loader-box {
        text-align: center;

    }

    .spinner {
        width: 60px;
        height: 60px;
        border: 4px solid rgba(3, 218, 198, 0.1);
        border-top-color: #03dac6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 24px auto;
        box-shadow: 0 0 15px rgba(3, 218, 198, 0.2);
    }

    .loader-box h2 {
        color: #ffffff;

        letter-spacing: 1px;
    }

    .loader-box p {
        color: #888888;

        margin: 0;
    }

    #ffmpegLoadingOverlay.fade-out {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
    }

    @keyframes spin {

    }

    body { 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        padding: 20px; background-color: #121212; 
        color: #e0e0e0; margin: 0; padding-bottom: 260px; min-height: 100vh;

        touch-action: manipulation; 
    }

    button, .action-btn, .tune-btn, .delete-btn, .download-btn, #gridViewBtn {
        touch-action: manipulation;
    }
    
    #welcomeOverlay {
        position: fixed; 
        top: 40%; 
        left: 50%; 
        transform: translate(-50%, -50%);
        text-align: center; 
        z-index: 10; 
        width: 90%; 
        max-width: 500px;
        pointer-events: auto; 
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-sizing: border-box;
        padding: 40px 20px;
        border: 2px dashed #444444;
        border-radius: 16px;
        background-color: rgba(255, 255, 255, 0.01);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
    }

    @media (hover: hover) {
        #welcomeOverlay:hover {
            border-color: #888888;
            background-color: rgba(255, 255, 255, 0.03);
            transform: translate(-50%, -52%);

        #welcomeOverlay:hover .upload-icon {

            transform: translateY(-4px);
        }
    }

    #welcomeOverlay.dragover {

        border-color: #03dac6;
        background-color: rgba(3, 218, 198, 0.06);
        box-shadow: 0 0 30px rgba(3, 218, 198, 0.25);

    }

    #welcomeOverlay.dragover .upload-icon {
        color: #03dac6;
        transform: scale(1.1);
    }

    .upload-icon {
        color: #666666;
        margin-bottom: 16px;
        transition: all 0.3s ease;
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }

    #welcomeOverlay h1 { 
        font-size: 1.8em; 
        color: #ffffff; 
        margin: 0 0 10px 0; 
        text-transform: uppercase;

    }
    #welcomeOverlay p {

        font-size: 0.95em; 
        line-height: 1.5;

    }

    @media (max-width: 400px) {

        #welcomeOverlay h1 { font-size: 1.5em; }
        #welcomeOverlay p { font-size: 0.85em; }

    body.has-clips #welcomeOverlay { opacity: 0; visibility: hidden; }
    #videoContainer { display: flex; flex-direction: column; align-items: center; width: 100%; position: relative; z-index: 2; gap: 25px; }
    
    .clip-wrapper { 
        display: flex; flex-direction: column; align-items: center; 
        border: 1px solid #2a2a2a; padding: 16px; 
        border-radius: 16px; background: #1e1e1e; width: fit-content; 
        max-width: 95%; box-shadow: 0 12px 40px rgba(0,0,0,0.6);

    }

    video { 
        width: auto; height: auto; max-width: 100%; max-height: 45vh; 
        border: 2px solid #333; border-radius: 10px; background: #000; cursor: pointer; display: block;

    .delete-btn, .download-btn { border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.85em; flex: 1; transition: background 0.2s, transform 0.1s; }

    .controls { 
        position: fixed; bottom: 0; left: 0; width: 100%; 
        background: #1a1a1a; padding: 15px 20px; border-top: 1px solid #2d2d2d; 
        z-index: 1000; display: flex; flex-direction: column; gap: 12px; align-items: center;

    }

    @media (max-width: 768px) and (orientation: portrait) {
        body { padding-bottom: 210px !important; }
        .controls { padding: 12px 16px !important; gap: 9px !important; }

    #gridOverlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(10,10,10,0.98); z-index: 2000;
        display: none; flex-direction: column; padding: 20px; box-sizing: border-box;
        overflow: hidden;
    }
    
    #gridContent { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
        gap: 16px;                  
        overflow-y: auto;
        max-height: calc(100vh - 80px);
        padding-bottom: 60px;
        box-sizing: border-box;
        -webkit-overflow-scrolling: touch;
    }

    .grid-item { 
        cursor: pointer; border: 2px solid #2d2d2d; border-radius: 10px; 
        overflow: hidden; position: relative; background: #000; 
        aspect-ratio: 16 / 9; 
        transition: border-color 0.2s;
    }

    .grid-item.portrait { aspect-ratio: 3 / 4 !important; }
    .grid-item:hover { border-color: #03dac6; }
    
    .grid-item img { 
        width: 100%; height: 100%; object-fit: cover; display: block; position: absolute; top: 0; left: 0; z-index: 1;
    }
    
    .grid-item .grid-meta { 
        position: absolute; bottom: 0; left: 0; width: 100%; 
        background: rgba(0, 0, 0, 0.85); font-size: 11px; padding: 6px 0; 
        text-align: center; color: #fff; display: flex; flex-direction: column; gap: 2px; z-index: 2; box-sizing: border-box;
    }

    .grid-meta .grid-label { font-weight: bold; color: #03dac6; text-overflow: ellipsis; white-space: nowrap; overflow: hidden; padding: 0 4px; }
    
    @media (orientation: landscape) {
        body { padding-bottom: 70px !important; }
        .controls {
            flex-direction: row !important; justify-content: space-between !important; align-items: center !important; gap: 12px !important; padding: 6px 16px !important; height: 56px !important; box-sizing: border-box !important;

        .controls > .controls-row:nth-child(1) { display: none !important; }
        .controls > .controls-row:nth-child(2) {
            background: transparent !important; padding: 0 !important; margin: 0 !important; width: auto !important; flex: 1 !important; display: flex !important; justify-content: center !important;

            flex-direction: row !important; flex-wrap: nowrap !important; background: #252525 !important; padding: 4px 10px !important; gap: 15px !important; max-width: none !important; width: auto !important; align-items: center !important; border-radius: 8px !important;
        }
        .controls > .controls-row:nth-child(2) > div > div { flex-direction: row !important; align-items: center !important; width: auto !important; gap: 6px !important; }
        .controls > .controls-row:nth-child(2) label { width: auto !important; text-align: left !important; font-size: 0.8em !important; white-space: nowrap !important; }
        #startTimeInput { width: 75px !important; padding: 4px 2px !important; font-size: 0.85em !important; }
        #durationInput { width: 32px !important; padding: 4px 2px !important; font-size: 0.85em !important; }
        #clipLabelInput { width: 130px !important; max-width: 180px !important; padding: 4px 6px !important; font-size: 0.85em !important; }
        .tune-btn { padding: 4px 6px !important; font-size: 0.75em !important; }
        .controls > .controls-row:nth-child(3) { width: auto !important; flex-shrink: 0 !important; justify-content: flex-end !important; gap: 6px !important; flex-wrap: nowrap !important; }
        .controls .action-btn, #gridViewBtn {
            padding: 0 10px !important; font-size: 0.8em !important; height: 34px !important; line-height: 34px !important; display: flex !important; align-items: center !important; justify-content: center !important; flex: unset !important; white-space: nowrap !important;
        }
        #gridViewBtn span { display: none !important; }
        #gridViewBtn svg { margin-right: 0 !important; }
    }

    button, .action-btn, .tune-btn, .delete-btn, .download-btn, #gridViewBtn, #closeGrid {
        -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
    }

    body {
        -webkit-touch-callout: none; -webkit-user-select: none; -khtml-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
    }

    input, textarea {
        -webkit-user-select: text; -khtml-user-select: text; -moz-user-select: text; -ms-user-select: text; user-select: text;
    }

<body>
    <div id="ffmpegLoadingOverlay">

    <input type="file" id="videoUpload" accept="video/*" style="display: none;">
    <p id="status" style="display: none; margin:0; font-size: 0.85em; color: #aaa; font-weight: 500;">Đang khởi tạo cấu trúc FFmpeg.wasm...</p>

    <div id="welcomeOverlay">
        <div class="upload-icon">

                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
        </div>
        <h1 id="mainTitle">Phân Đoạn Video</h1>
        <p id="subTitle">Thả tệp video vào đây hoặc chạm để chọn từ thiết bị của bạn</p>
    </div>

    <div id="videoContainer"></div>

    <div id="gridOverlay">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3 style="margin:0; font-size: 1.4em;" id="gridTitle">Danh Sách Phân Đoạn</h3>
            <button id="closeGrid" style="background:#cf6679; border:none; padding:10px 20px; border-radius:6px; font-weight:bold; cursor:pointer; color:#000;">Đóng Lưới</button>
        </div>
        <div id="gridContent"></div>
    </div>

    <div class="controls">
        <div class="controls-row"></div>
        <div class="controls-row" style="background: #252525; padding: 8px; border-radius: 8px; gap: 6px;">
            <div style="background: #252525; padding: 12px; border-radius: 8px; gap: 10px; display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 400px; box-sizing: border-box;">
                <div style="display: flex; gap: 8px; align-items: center; width: 100%;">
                    <label style="font-size:0.85em; color:#aaa; width: 100px; text-align: right; flex-shrink: 0;">Cắt từ:</label>
                    <div style="display: flex; gap: 6px; align-items: center; flex-grow: 1;">
                        <button class="tune-btn" id="btnPrevTime" style="flex-shrink: 0;"><<</button>
                        <input type="text" id="startTimeInput" value="00:00:00" style="flex-grow: 1; width: 100%; min-width: 0;">
                        <button class="tune-btn" id="btnNextTime" style="flex-shrink: 0;">>></button>
                    </div>
                </div>
                <div style="display: flex; gap: 8px; align-items: center; width: 100%;">
                    <label style="font-size:0.85em; color:#aaa; width: 100px; text-align: right; flex-shrink: 0;">Độ dài clip (s):</label>
                    <div style="display: flex; gap: 6px; align-items: center; flex-grow: 1;">
                        <input type="number" id="durationInput" value="5" min="1" step="0.5" >
                        <input type="text" id="clipLabelInput" placeholder="Đặt tên phân đoạn (tùy chọn)" style="flex-grow: 1; width: 100%; min-width: 0;">
                    </div>
                </div>
            </div>
        </div>
        <div class="controls-row">                                            
            <button id="nextBtn" class="action-btn" disabled>Đang tải Core...</button>
            <button id="randomBtn" class="action-btn" disabled>Random 5s</button>
            <button id="gridViewBtn" title="Xem dạng lưới" disabled>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="margin-right:4px;"><path d="M4 11h5V5H4v6zm0 7h5v-6H4v6zm6 0h5v-6h-5v6zm6 0h5v-6h-5v6zm-6-7h5V5h-5v6zm6-6v6h5V5h-5z"/></svg>
                <span></span>
            </button>
        </div>
    </div>
    
    <script>
        const videoContainer = document.getElementById('videoContainer');
        const upload = document.getElementById('videoUpload');
        const nextBtn = document.getElementById('nextBtn');
        const randomBtn = document.getElementById('randomBtn');
        const gridViewBtn = document.getElementById('gridViewBtn');
        const gridOverlay = document.getElementById('gridOverlay');
        const gridContent = document.getElementById('gridContent');
        const status = document.getElementById('status');
        const startTimeInput = document.getElementById('startTimeInput');
        const durationInput = document.getElementById('durationInput');
        const clipLabelInput = document.getElementById('clipLabelInput');
        const welcomeOverlay = document.getElementById('welcomeOverlay');
            
        if (navigator.storage && navigator.storage.persist) {
            navigator.storage.persist().then((granted) => {
                if (granted) {
                    console.log("🚀 Android đã cấp quyền duy trì dữ liệu bền vững cho App!");
                    if (status) status.innerText = "✓ Chế độ lưu trữ bền vững đã kích hoạt.";
                }
            });
        }
            
        // Đã tối ưu hóa loại bỏ hoàn toàn việc đọc nhị phân gây nghẽn RAM của trình duyệt Android non-Chrome
        async function checkFileConnection() {
            if (!rawVideoFile) return false;
            return (rawVideoFile.size > 0); 
        }

        welcomeOverlay.addEventListener('click', () => { upload.click(); });

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            welcomeOverlay.addEventListener(eventName, (e) => e.preventDefault(), false);
        });

        ['dragenter', 'dragover'].forEach(eventName => {
            welcomeOverlay.addEventListener(eventName, () => { welcomeOverlay.classList.add('dragover'); }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            welcomeOverlay.addEventListener(eventName, () => { welcomeOverlay.classList.remove('dragover'); }, false);
        });

        welcomeOverlay.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const files = dt.files;
            if (files.length > 0 && files[0].type.startsWith('video/')) {
                upload.files = files;
                const event = new Event('change', { bubbles: true });
                upload.dispatchEvent(event);
            } else {
                alert("Vui lòng thả một tệp tin định dạng Video hợp lệ!");
            }
        });

        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ log: true });
        let isFFmpegReady = false;

        let rawVideoFile = null; 
        let sharedVideoURL = null; 
        let totalVideoDuration = 0;
        let currentlyUnmutedVideo = null; 
        let rehydrationTimeout = null;
            
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || 
                      (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

        async function loadFFmpegCore() {
            const loadingOverlay = document.getElementById('ffmpegLoadingOverlay');
            const loadingStatusText = document.getElementById('loadingStatusText');
            try {
                await ffmpeg.load();
                isFFmpegReady = true;
                status.innerText = "Hệ thống Core đã sẵn sàng! Vui lòng chọn Video.";
                if(upload.files[0]) { enableControls(); }
                setTimeout(() => { loadingOverlay.classList.add('fade-out'); }, 300);
            } catch (error) {
                console.error(error);
                status.innerText = "Lỗi khởi tạo Core.";
                if (loadingStatusText) {
                    loadingStatusText.innerText = "❌ Lỗi khởi tạo hệ thống xử lý!";
                    loadingStatusText.style.color = "#cf6679";
                }
            }
        }

        loadFFmpegCore();

        durationInput.addEventListener('input', () => {
            const val = durationInput.value || 0;
            randomBtn.innerText = `Random ${val}s`;
        });

        function adjustTime(amount) {
            let currentSeconds = parseTime(startTimeInput.value);
            currentSeconds = Math.max(0, Math.min(totalVideoDuration, currentSeconds + amount));
            startTimeInput.value = formatTime(currentSeconds);
        }

        window.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName === 'INPUT') return; 
            if (e.code === 'Space') {
                e.preventDefault();
                if (currentlyUnmutedVideo) {
                    if (currentlyUnmutedVideo.paused) currentlyUnmutedVideo.play().catch(()=>{});
                    else currentlyUnmutedVideo.pause();
                }
            } else if (e.code === 'ArrowLeft') {
                e.preventDefault(); adjustTime(-0.1);
            } else if (e.code === 'ArrowRight') {
                e.preventDefault(); adjustTime(0.1);
            } else if (e.code === 'Enter') {
                e.preventDefault(); if (!nextBtn.disabled) nextBtn.click();
            }
        });

        const clipObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const video = entry.target;
                if (entry.isIntersecting) {
                    if (video.src && video.src !== "" && video.src !== window.location.href) {
                        video.play().catch(() => {});
                    }
                } else {
                    video.pause();
                    if (isIOS) video.muted = true;
                    video.volume = 0.001; 
                    video.classList.remove('unmuted');
                    if (currentlyUnmutedVideo === video) currentlyUnmutedVideo = null;
                }
            });
        }, { threshold: 0.1 });
            
        let autoTuneInterval = null;
        let autoTuneTimeout = null;

        function startAutoTune(amount) {
            adjustTime(amount);
            autoTuneTimeout = setTimeout(() => {
                autoTuneInterval = setInterval(() => { adjustTime(amount); }, 60);
            }, 250);
        }

        function stopAutoTune() {
            if (autoTuneTimeout) clearTimeout(autoTuneTimeout);
            if (autoTuneInterval) clearInterval(autoTuneInterval);
            autoTuneTimeout = null;
            autoTuneInterval = null;
        }

        const btnPrevTime = document.getElementById('btnPrevTime');
        const btnNextTime = document.getElementById('btnNextTime');

        if (btnPrevTime && btnNextTime) {
            btnPrevTime.addEventListener('mousedown', (e) => { e.preventDefault(); startAutoTune(-1); });
            btnPrevTime.addEventListener('touchstart', (e) => { e.preventDefault(); startAutoTune(-1); }, { passive: false });
            btnNextTime.addEventListener('mousedown', (e) => { e.preventDefault(); startAutoTune(1); });
            btnNextTime.addEventListener('touchstart', (e) => { e.preventDefault(); startAutoTune(1); }, { passive: false });
            window.addEventListener('mouseup', stopAutoTune);
            window.addEventListener('touchend', stopAutoTune);
            btnPrevTime.addEventListener('mouseleave', stopAutoTune);
            btnNextTime.addEventListener('mouseleave', stopAutoTune);
        }

        function handleClipRehydration() {
            if (rehydrationTimeout) clearTimeout(rehydrationTimeout);
            rehydrationTimeout = setTimeout(() => {
                const allWrappers = Array.from(document.querySelectorAll('.clip-wrapper'));
                if (allWrappers.length === 0) return;
                const viewportHeight = window.innerHeight;
                const visibleIndices = allWrappers.map((wrapper, index) => {
                    const rect = wrapper.getBoundingClientRect();
                    return (rect.top < viewportHeight && rect.bottom > 0) ? index : -1;
                }).filter(idx => idx !== -1);
                if (visibleIndices.length === 0) return;
                const safeStart = Math.max(0, visibleIndices[0] - 3);
                const safeEnd = Math.min(allWrappers.length - 1, visibleIndices[visibleIndices.length - 1] + 3);

                allWrappers.forEach((wrapper, index) => {
                    const video = wrapper.querySelector('video');
                    if (index >= safeStart && index <= safeEnd) {
                        if (!video.src || video.src === "" || video.src === window.location.href) {
                            video.src = sharedVideoURL;
                            video.currentTime = parseFloat(video.dataset.startTime);
                            video.load();
                        }
                    } else {
                        if (video.src && video.src !== "" && video.src !== window.location.href) {
                            video.pause(); video.src = ""; video.load(); 
                        }
                    }
                });
            }, 250);
        }

        window.addEventListener('scroll', handleClipRehydration, { passive: true });

        function setFocusAudio(videoElement) {
            if (currentlyUnmutedVideo && currentlyUnmutedVideo !== videoElement) {
                if (isIOS) currentlyUnmutedVideo.muted = true;
                currentlyUnmutedVideo.volume = 0.001; 
                currentlyUnmutedVideo.classList.remove('unmuted');
            }
            if (isIOS) videoElement.muted = false;
            videoElement.volume = 1.0; 
            videoElement.classList.add('unmuted');
            currentlyUnmutedVideo = videoElement;
        }

        function enableControls() {
            if (isFFmpegReady && sharedVideoURL) {
                nextBtn.disabled = false;
                randomBtn.disabled = false;
                gridViewBtn.disabled = false;
                nextBtn.innerText = "Thêm đoạn";
            }
        }

        upload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                rawVideoFile = file; 
                if (sharedVideoURL) URL.revokeObjectURL(sharedVideoURL); 
                sharedVideoURL = URL.createObjectURL(file);
                
                const tempVideo = document.createElement('video');
                tempVideo.src = sharedVideoURL;
                tempVideo.onloadedmetadata = () => {
                    totalVideoDuration = tempVideo.duration;
                    const hasExistingClips = videoContainer.children.length > 0;
                    
                    if (!hasExistingClips) {
                        videoContainer.innerHTML = ""; 
                        gridContent.innerHTML = "";
                        document.body.classList.remove('has-clips');
                        document.getElementById('mainTitle').innerText = "Video sẵn sàng";
                        document.getElementById('mainTitle').style.color = "#2ecc71";
                        document.getElementById('subTitle').innerHTML = "💡 Thiết lập mốc thời gian bắt đầu, gán nhãn rồi nhấn <b>Thêm đoạn</b>.";
                    } else {
                        console.log("🔄 Đang hồi sinh nguồn dữ liệu cho các phân đoạn cũ...");
                        const allVideos = videoContainer.querySelectorAll('video');
                        allVideos.forEach(video => {
                            const startPos = parseFloat(video.dataset.startTime) || 0;
                            video.src = sharedVideoURL;
                            video.currentTime = startPos;
                            video.load();
                            video.play().catch(() => {});
                        });
                        
                        // Trì hoãn việc render lại ảnh lưới để tránh sập RAM ngay lập tức trên trình duyệt yếu
                        setTimeout(() => {
                            const gridItems = gridContent.querySelectorAll('.grid-item');
                            gridItems.forEach(item => {
                                const clipId = item.getAttribute('data-grid-id');
                                const targetWrapper = document.getElementById(clipId);
                                if (targetWrapper) {
                                    const targetVideo = targetWrapper.querySelector('video');
                                    const startTime = parseFloat(targetVideo.dataset.startTime) || 0;
                                    const img = item.querySelector('img');
                                    captureThumbnail(startTime).then(thumbUrl => {
                                        if (thumbUrl && img) img.src = thumbUrl;
                                    });
                                }
                            });
                        }, 600);
                        
                        document.body.classList.add('has-clips');
                    }
                    
                    upload.value = ""; 
                    status.innerText = `Thời lượng video: ${formatTime(totalVideoDuration)}`;
                    enableControls();
                    
                    // Giải phóng bộ nhớ của thẻ video tạm ngay lập tức
                    tempVideo.pause(); tempVideo.src = ""; tempVideo.load(); tempVideo.remove();
                };
            }
        });

        // Tối ưu hóa triệt để Canvas và luồng Video để không ngốn RAM Android
        async function captureThumbnail(startTime) {
            return new Promise((resolve) => {
                const canvas = document.createElement('canvas');
                const v = document.createElement('video');
                v.src = sharedVideoURL;
                v.muted = true;
                v.playsInline = true;
                v.preload = "auto";
                
                v.setAttribute('playsinline', '');
                v.setAttribute('webkit-playsinline', '');

                v.onloadedmetadata = () => { v.currentTime = startTime; };
                v.onseeked = () => {
                    // Cho trình duyệt 60ms để giải mã khung hình thay vì 150ms để tối ưu tốc độ phản hồi nút bấm
                    setTimeout(() => {
                        try {
                            const videoWidth = v.videoWidth || 160;
                            const videoHeight = v.videoHeight || 160;
                            const scale = 120 / Math.max(videoWidth, videoHeight); // Giảm nhẹ size ảnh lưới xuống 120px để siêu nhẹ RAM
                            canvas.width = videoWidth * scale; 
                            canvas.height = videoHeight * scale;
                            
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(v, 0, 0, canvas.width, canvas.height);
                            const dataUrl = canvas.toDataURL('image/jpeg', 0.5); // Giảm chất lượng từ 0.6 xuống 0.5 để nén dữ liệu cực nhỏ
                            
                            v.pause(); v.src = ""; v.load(); v.removeAttribute('src'); v.remove();
                            resolve(dataUrl);
                        } catch(e) {
                            console.error("Lỗi vẽ Canvas Thumbnail:", e);
                            resolve("");
                        }
                    }, 60); 
                };

                v.onerror = () => {
                    v.pause(); v.src = ""; v.load(); v.removeAttribute('src'); v.remove(); resolve("");
                };

                setTimeout(() => {
                    if (v.src) { v.pause(); v.src = ""; v.load(); v.removeAttribute('src'); v.remove(); resolve(""); }
                }, 2000);

                v.load();
            });
        }

        function addGridItemAhead(clipId, startTime, labelText) {
            const gridItem = document.createElement('div');
            gridItem.className = 'grid-item';
            gridItem.setAttribute('data-grid-id', clipId);
            
            const img = document.createElement('img');
            img.alt = "Thumbnail";
            gridItem.appendChild(img);
            
            const metaContainer = document.createElement('div');
            metaContainer.className = 'grid-meta';
            
            if(labelText) {
                const gridLabel = document.createElement('span');
                gridLabel.className = 'grid-label';
                gridLabel.innerText = labelText;
                metaContainer.appendChild(gridLabel);
            }
            
            const timeSpan = document.createElement('span');
            timeSpan.innerText = formatTime(startTime);
            metaContainer.appendChild(timeSpan);
            gridItem.appendChild(metaContainer);
            
            gridItem.onclick = () => {
                gridOverlay.style.display = 'none';
                const targetWrapper = document.getElementById(clipId);
                if (!targetWrapper) return;
                const targetVideo = targetWrapper.querySelector('video');
                targetWrapper.scrollIntoView({ behavior: 'smooth', block: 'center' });
                setTimeout(() => {
                    if (!targetVideo.src || targetVideo.src === "" || targetVideo.src === window.location.href) {
                        targetVideo.src = sharedVideoURL;
                        targetVideo.currentTime = startTime;
                        targetVideo.load();
                    }
                    setFocusAudio(targetVideo);
                    targetVideo.play().catch(() => {});
                }, 400);
            };
            
            gridContent.appendChild(gridItem);

            // Bọc hành vi chụp ảnh vào requestIdleCallback hoặc setTimeout để ưu tiên cho các nút bấm chính sáng lên trước
            setTimeout(() => {
                captureThumbnail(startTime).then(thumbUrl => {
                    if (thumbUrl) img.src = thumbUrl;
                });
            }, 100);
        }

        nextBtn.addEventListener('click', async () => {
            if (!sharedVideoURL) return;
            
            const isFileAlive = await checkFileConnection();
            if (!isFileAlive) {
                alert("⚠️ Hệ thống đã ngắt kết nối tệp tin để giải phóng RAM.\nVui lòng chọn lại đúng video ban đầu để tiếp tục tạo phân đoạn!");
                upload.value = "";
                upload.click(); 
                return;
            }
            
            const start = parseTime(startTimeInput.value);
            const duration = parseFloat(durationInput.value) || 5;
            const clipLabel = clipLabelInput.value.trim();

            if (start >= totalVideoDuration) {
                alert("Thời gian bắt đầu vượt quá tổng độ dài video!");
                return;
            }
            document.body.classList.add('has-clips');
            const end = Math.min(start + duration, totalVideoDuration);
            const clipId = "clip-" + Date.now();
            
            const wrapper = document.createElement('div');
            wrapper.className = 'clip-wrapper';
            wrapper.id = clipId;
            
            if(clipLabel) {
                const titleTag = document.createElement('div');
                titleTag.className = 'clip-title-tag';
                titleTag.innerText = `🏷️ ${clipLabel}`;
                wrapper.appendChild(titleTag);
            }
            
            const video = document.createElement('video');
            video.muted = isIOS ? true : false; 
            video.volume = 0.001; 
            video.playsInline = true; 
            video.preload = "metadata";
            video.src = sharedVideoURL;
            video.dataset.startTime = start;
            video.dataset.isInitialLoad = "true";
            
            video.onclick = () => {
                const isMutedNow = isIOS ? video.muted : (video.volume < 1);
                if (isMutedNow) setFocusAudio(video);
                else { 
                    if (isIOS) video.muted = true;
                    video.volume = 0.001; 
                    video.classList.remove('unmuted'); 
                    currentlyUnmutedVideo = null; 
                }
            };

            video.ontimeupdate = () => {
                if (video.currentTime >= end) {
                    video.currentTime = start;
                    video.play().catch(() => {});
                }
            };
            
            video.onloadedmetadata = () => {
                const width = video.videoWidth;
                const height = video.videoHeight;
                video.style.setProperty('--video-ratio', `${width} / ${height}`);
                if (height > width) video.classList.add('portrait');
                video.currentTime = start;
            };
            
            video.onloadeddata = () => { 
                if (video.dataset.isInitialLoad === "true") {
                    wrapper.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    setFocusAudio(video);
                    video.dataset.isInitialLoad = "false";
                }
                video.play().catch(() => {});
            };
            
            const info = document.createElement('div');
            info.className = 'clip-info';
            info.innerText = `${formatTime(start)} - ${formatTime(end)} (${(end - start).toFixed(1)}s)`;
            
            const btnGroup = document.createElement('div');
            btnGroup.className = 'button-group';
            
            const dl = document.createElement('button');
            dl.className = 'download-btn'; dl.innerText = "Tải Xuống .MP4";
            dl.onclick = () => downloadClipFFmpeg(start, (end - start), clipLabel, dl);
            
            const del = document.createElement('button');
            del.className = 'delete-btn'; del.innerText = "Xóa Đoạn";
            del.onclick = () => {
                clipObserver.unobserve(video); 
                video.pause(); video.src = ""; video.load();
                wrapper.remove();
                const gridItem = document.querySelector(`[data-grid-id="${clipId}"]`);
                if (gridItem) gridItem.remove(); 
                if (videoContainer.children.length === 0) document.body.classList.remove('has-clips');
                handleClipRehydration();
            };
            
            btnGroup.appendChild(dl); btnGroup.appendChild(del);
            wrapper.appendChild(video); wrapper.appendChild(info); wrapper.appendChild(btnGroup);
            videoContainer.appendChild(wrapper);
            
            clipObserver.observe(video);
            addGridItemAhead(clipId, start, clipLabel);
            
            startTimeInput.value = formatTime(end);
            clipLabelInput.value = ""; 
            handleClipRehydration();
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        });

        gridViewBtn.onclick = () => { gridOverlay.style.display = 'flex'; };
        document.getElementById('closeGrid').onclick = () => gridOverlay.style.display = 'none';

        async function downloadClipFFmpeg(startTime, duration, labelText, btn) {
            if (!isFFmpegReady) {
                alert("Hệ thống FFmpeg core đang tải, vui lòng thử lại sau vài giây!");
                return;
            }
            if (!rawVideoFile) {
                alert("Lỗi: Không tìm thấy file video đầu vào.");
                return;
            }
            
            const isFileAlive = await checkFileConnection();
            if (!isFileAlive) {
                alert("⚠️ Hệ thống đã ngắt kết nối tệp tin để giải phóng RAM.\nVui lòng chọn lại video để tiếp tục trích xuất!");
                upload.value = "";
                upload.click(); 
                return;
            }

            const originalBtnText = btn.innerText;
            btn.disabled = true;
            btn.innerText = '⌛ Đang xử lý...';
            status.innerText = `⏳ Thực thi trích xuất đoạn [${formatTime(startTime)}] độ dài ${duration}s...`;

            const timestamp = Date.now();
            const cleanFileName = rawVideoFile.name.replace(/\s+/g, '_');
            const virtualInputName = `input_${timestamp}_${cleanFileName}`;
            const outputName = `cut_${timestamp}.mp4`;

            try {
                ffmpeg.FS('writeFile', virtualInputName, await fetchFile(rawVideoFile));
                await ffmpeg.run('-ss', startTime.toString(), '-i', virtualInputName, '-t', duration.toString(), '-c', 'copy', outputName);
                
                const data = ffmpeg.FS('readFile', outputName);
                const videoUrl = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
                
                const suffix = labelText ? `_${labelText.replace(/[^a-zA-Z0-9]/g, '_')}` : '';
                const downloadName = `clip_${formatTime(startTime).replace(/:/g, '-')}${suffix}.mp4`;
                
                const a = document.createElement('a');
                a.href = videoUrl; a.download = downloadName;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);

                try { ffmpeg.FS('unlink', outputName); } catch(e){}
                status.innerText = `✨ Trích xuất thành công: ${downloadName}`;
            } catch (err) {
                console.error(err);
                alert("Có lỗi xảy ra trong quá trình xử lý dòng lệnh FFmpeg.");
                status.innerText = "❌ Lỗi thực thi Render.";
            } finally {
                btn.disabled = false; btn.innerText = originalBtnText;
                try { ffmpeg.FS('unlink', virtualInputName); } catch(e){}
            }
        }

        randomBtn.onclick = async () => {
            const isFileAlive = await checkFileConnection();
            if (!isFileAlive) {
                alert("⚠️ Hệ thống đã ngắt kết nối tệp tin để giải phóng RAM.\nVui lòng chọn lại đúng video ban đầu để tiếp tục tạo phân đoạn!");
                upload.value = "";
                upload.click(); 
                return;
            }
            const d = parseFloat(durationInput.value) || 5;
            const maxRange = Math.max(0, totalVideoDuration - d);
            const randomSeconds = Math.random() * maxRange;
            startTimeInput.value = formatTime(randomSeconds);
            
            setTimeout(() => { if (!nextBtn.disabled) { nextBtn.click(); } }, 50);
        };

        function formatTime(s) {
            const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = Math.floor(s % 60);
            return [h, m, sec].map(v => String(v).padStart(2, '0')).join(':');
        }
        
        function parseTime(t) {
            const p = t.replace(/[^0-9:]/g, '').split(':').reverse();
            let seconds = 0;
            if (p[0]) seconds += parseInt(p[0]) || 0;     
            if (p[1]) seconds += (parseInt(p[1]) || 0) * 60; 
            if (p[2]) seconds += (parseInt(p[2]) || 0) * 3600; 
            return seconds;
        }
            
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length !== 1) return;
            const touch = e.touches[0];
            window.initialTouchY = touch.clientY;
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            if (window.initialTouchY === undefined) return;
            const touch = e.touches[0];
            const currentY = touch.clientY;
            const diffY = currentY - window.initialTouchY;

            if ((document.documentElement.scrollTop === 0 && diffY > 0) || 
                (window.innerHeight + window.pageYOffset >= document.documentElement.scrollHeight && diffY < 0)) {
                if (gridOverlay.style.display !== 'flex') {
                    if (e.cancelable) e.preventDefault();
                }
            }
        }, { passive: false });
            
        let lastTouchEnd = 0;
        document.addEventListener('touchend', (e) => {
            const now = (new Date()).getTime();
            if (e.target.closest('button') || e.target.closest('.tune-btn') || e.target.closest('input')) { return; }
            if (now - lastTouchEnd <= 300) { if (e.cancelable) e.preventDefault(); }
            lastTouchEnd = now;
        }, false);

        document.addEventListener('contextmenu', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') { return; }
            e.preventDefault();
        }, false);
    </script>
