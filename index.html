    /* --- GIAO DIỆN MÀN HÌNH LOADING TOÀN MÀN HÌNH --- */
#ffmpegLoadingOverlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: #121212; /* Tiệp màu nền tối của app */
    z-index: 9999; /* Đảm bảo nằm trên cùng tất cả các thành phần khác */
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.5s ease, visibility 0.5s ease;
}

/* Khung bọc căn giữa */
.loader-box {
    text-align: center;
    padding: 20px;
    max-width: 90%;
}

/* Vòng xoay chuyển động Neon công nghệ */
.spinner {
    width: 60px;
    height: 60px;
    border: 4px solid rgba(3, 218, 198, 0.1);
    border-top-color: #03dac6; /* Màu xanh neon đồng bộ với nút bấm của bạn */
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 24px auto;
    box-shadow: 0 0 15px rgba(3, 218, 198, 0.2);
}

.loader-box h2 {
    color: #ffffff;
    font-size: 1.4em;
    margin: 0 0 10px 0;
    letter-spacing: 1px;
}

.loader-box p {
    color: #888888;
    font-size: 0.95em;
    margin: 0;
}

/* Hiệu ứng ẩn màn hình chờ mượt mà */
#ffmpegLoadingOverlay.fade-out {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
}

/* Định nghĩa chuyển động xoay tròn */
@keyframes spin {
    to { transform: rotate(360deg); }
}

        body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
    padding: 20px; background-color: #121212; 
    color: #e0e0e0; margin: 0; padding-bottom: 260px; min-height: 100vh;
    display: flex; flex-direction: column;
    
    /* CHẶN PULL TO REFRESH TRÊN MOBILE */
    overscroll-behavior-y: contain; 

    /* THÊM DÒNG NÀY: Chặn double-tap zoom trên toàn bộ trang */
    touch-action: manipulation; 
}

/* Áp dụng thêm cho tất cả các nút bấm để chắc chắn không bị dính zoom */
button, .action-btn, .tune-btn, .delete-btn, .download-btn, #gridViewBtn {
    touch-action: manipulation;
}


    
        #welcomeOverlay {
    position: fixed; 
    top: 40%; 
    left: 50%; 
    transform: translate(-50%, -50%);
    text-align: center; 
    z-index: 10; 
    width: 90%; 
    max-width: 500px; /* Thu gọn chiều rộng tối đa giúp bố cục cô đọng hơn */
    pointer-events: auto; 
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    
    /* Chống tràn viền tuyệt đối trên Mobile */
    box-sizing: border-box;
    padding: 40px 20px;
    
    /* Giao diện mặc định */
    border: 2px dashed #444444;
    border-radius: 16px;
    background-color: rgba(255, 255, 255, 0.01);
    backdrop-filter: blur(4px); /* Tạo hiệu ứng kính mờ sang trọng */
    -webkit-backdrop-filter: blur(4px);
}

/* Hiệu ứng khi di chuột qua (Hover) trên Máy tính */
@media (hover: hover) {
    #welcomeOverlay:hover {
        border-color: #888888;
        background-color: rgba(255, 255, 255, 0.03);
        transform: translate(-50%, -52%); /* Nhấc nhẹ khung lên tạo chiều sâu */
    }
    #welcomeOverlay:hover .upload-icon {
        color: #ffffff;
        transform: translateY(-4px); /* Icon nhích nhẹ lên kích thích hành động */
    }
}

/* Hiệu ứng cao cấp khi kéo tệp tin đè lên vùng nhận diện (Dragover) */
#welcomeOverlay.dragover {
    border-style: solid; /* Chuyển từ nét đứt sang nét liền */
    border-color: #03dac6;
    background-color: rgba(3, 218, 198, 0.06);
    box-shadow: 0 0 30px rgba(3, 218, 198, 0.25);
    transform: translate(-50%, -50%) scale(1.02); /* Phình to nhẹ báo hiệu sẵn sàng */
}

#welcomeOverlay.dragover .upload-icon {
    color: #03dac6;
    transform: scale(1.1);
}

/* Thiết kế Icon kéo thả */
.upload-icon {
    color: #666666;
    margin-bottom: 16px;
    transition: all 0.3s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
}

/* Tối ưu hóa kích thước chữ để không bị vỡ bố cục trên màn hình nhỏ (<360px) */
#welcomeOverlay h1 { 
    font-size: 1.8em; 
    color: #ffffff; 
    margin: 0 0 10px 0; 
    text-transform: uppercase; 
    letter-spacing: 1.5px; 
}
#welcomeOverlay p { 
    color: #888888; 
    font-size: 0.95em; 
    line-height: 1.5; 
    margin: 0; 
}

/* Thu nhỏ cấu trúc hơn nữa trên điện thoại cực nhỏ */
@media (max-width: 400px) {
    #welcomeOverlay {
        padding: 30px 16px;
    }
    #welcomeOverlay h1 {
        font-size: 1.5em;
    }
    #welcomeOverlay p {
        font-size: 0.85em;
    }
    .upload-icon svg {
        width: 40px;
        height: 40px;
    }
}




        body.has-clips #welcomeOverlay { opacity: 0; visibility: hidden; }
        
        #videoContainer { display: flex; flex-direction: column; align-items: center; width: 100%; position: relative; z-index: 2; gap: 25px; }
        
        .clip-wrapper { 
            display: flex; flex-direction: column; align-items: center; 
            border: 1px solid #2a2a2a; padding: 16px; 
            border-radius: 16px; background: #1e1e1e; width: fit-content; 
            max-width: 95%; box-shadow: 0 12px 40px rgba(0,0,0,0.6); 
            height: auto; transition: transform 0.2s ease;
        }

        video { 
            width: auto; height: auto; max-width: 100%; max-height: 45vh; 
            border: 2px solid #333; border-radius: 10px; background: #000; cursor: pointer; display: block;
            aspect-ratio: var(--video-ratio); 
            object-fit: contain; 
        }

        video.portrait { 
            width: 50vw; max-width: 50vw; max-height: 65vh; 
            height: auto; 
        }

        video.unmuted { border-color: #03dac6; box-shadow: 0 0 20px rgba(3, 218, 198, 0.4); }
        
        .clip-title-tag { font-size: 0.95em; color: #fff; font-weight: bold; margin-bottom: 6px; align-self: flex-start; text-overflow: ellipsis; white-space: nowrap; overflow: hidden; max-width: 100%; }
        .clip-info { font-size: 0.85em; color: #999; margin: 8px 0; font-family: monospace; background: #292929; padding: 4px 8px; border-radius: 4px; }
        .button-group { display: flex; gap: 10px; margin-top: 4px; width: 100%; }
        
        .delete-btn, .download-btn { border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.85em; flex: 1; transition: background 0.2s, transform 0.1s; }
        .delete-btn { background-color: #cf6679; color: #000; }
        .delete-btn:active { transform: scale(0.98); }
        .download-btn { background-color: #03dac6; color: #000; }
        .download-btn:not(:disabled):hover { background-color: #01f5dd; }
        .download-btn:active { transform: scale(0.98); }
        
                        .controls { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: #1a1a1a; padding: 15px 20px; border-top: 1px solid #2d2d2d; 
            z-index: 1000; display: flex; flex-direction: column; gap: 12px; align-items: center; 
            box-shadow: 0 -8px 24px rgba(0,0,0,0.6); box-sizing: border-box;
        }
        /* --- THU NHỎ 80% BẰNG CÁCH GIẢM KÍCH THƯỚC TRÊN ĐIỆN THOẠI (DỌC) --- */
        @media (max-width: 768px) and (orientation: portrait) {
            body {
                padding-bottom: 210px !important; /* Thu hẹp khoảng trống đáy để vừa khít thanh controls mới */
            }
            .controls {
                padding: 12px 16px !important; /* Giảm khoảng đệm xung quanh thanh điều khiển */
                gap: 9px !important;           /* Thu hẹp khoảng cách giữa các hàng */
            }
            .controls-row {
                gap: 6px !important;           /* Thu hẹp khoảng cách giữa các nút */
            }
            .controls-row .action-btn, 
            .controls-row #gridViewBtn {
                padding: 8px 6px !important;   /* Thu nhỏ nút bấm */
                font-size: 0.75em !important;  /* Hạ cỡ chữ xuống mức ~80% */
            }
            input, select {
                padding: 6px 10px !important;  /* Thu nhỏ các ô nhập liệu */
                font-size: 0.75em !important;  /* Hạ cỡ chữ của ô nhập liệu */
            }
            #startTimeInput { width: 80px !important; }
            #durationInput { width: 32px !important; }
            #clipLabelInput { width: 120px !important; }
            .tune-btn {
                padding: 5px 8px !important;   /* Thu nhỏ 2 nút tăng giảm thời gian < và > */
                font-size: 0.7em !important;
            }
            /* Hạ khoảng đệm của khung xám bọc các ô input */
            .controls > .controls-row:nth-child(2) > div {
                padding: 9px !important;
                gap: 8px !important;
            }
        }


        /* Ép dòng controls chứa 3 nút chính luôn nằm trên 1 hàng */
.controls-row { 
    display: flex; 
    gap: 8px; /* Giảm khoảng cách giữa các nút một chút trên mobile */
    align-items: center; 
    justify-content: center; 
    flex-wrap: nowrap; /* KHÔNG cho phép xuống dòng */
    width: 100%; 
}

/* Tối ưu hóa các nút bấm để tự co giãn mượt mà trên điện thoại */
.controls-row .action-btn, 
.controls-row #gridViewBtn {
    flex: 1; /* Chia đều không gian hàng cho 3 nút */
    min-width: 0; /* Ngăn nút bị vỡ cấu trúc layout */
    white-space: nowrap; /* Không cho chữ bên trong nút tự xuống dòng */
    padding: 10px 8px; /* Thu gọn padding ngang để vừa màn hình nhỏ */
    font-size: 0.85em; /* Giảm nhẹ size chữ để chắc chắn không bị tràn text */
}

        
        input, select { padding: 8px 12px; background: #2d2d2d; color: white; border: 1px solid #444; border-radius: 6px; text-align: center; font-size: 0.9em; outline: none; }
        input:focus { border-color: #03dac6; }
        #startTimeInput { width: 95px; font-family: monospace; font-size: 1em; }
        #durationInput { width: 40px; }
        #clipLabelInput { width: 150px; text-align: left; }
        
        button.action-btn { color: #000; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.9em; transition: background 0.2s; }
        #nextBtn { background-color: #03dac6; }
        #randomBtn { background-color: #bb86fc; }
        .tune-btn { background: #3a3a3a; color: #fff; border: 1px solid #555; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8em; font-weight: bold; }
        .tune-btn:hover { background: #4a4a4a; }
        
        button:disabled { background-color: #444 !important; color: #888 !important; cursor: not-allowed; }

        #gridViewBtn { background-color: #ff9800; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #000; }
        
                                /* --- ĐÃ SỬA: Biến toàn bộ giao diện Lưới thành một vùng cuộn độc lập --- */
        #gridOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10,10,10,0.98); z-index: 2000;
            display: none; flex-direction: column; padding: 20px; box-sizing: border-box;
            overflow: hidden; /* Giữ cố định khung bọc ngoài */
        }
        
        /* --- ĐÃ SỬA: Giới hạn chiều cao vùng chứa ảnh để kích hoạt thanh cuộn dọc mượt mà --- */
        #gridContent { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 16px;                  
            overflow-y: auto;           /* KÍCH HOẠT THANH CUỘN: Cho phép vuốt lên xuống thoải mái */
            max-height: calc(100vh - 80px); /* Khống chế chiều cao tối đa không vượt quá đáy màn hình */
            padding-bottom: 60px;       /* Vùng đệm an toàn dưới đáy để không bị khuất ảnh cuối */
            box-sizing: border-box;
            -webkit-overflow-scrolling: touch; /* Giúp vuốt cực mượt trên màn hình iPhone/iPad */
        }

        /* --- ĐÃ SỬA: Đặt khung hình chữ nhật 16:9 mặc định cho video ngang --- */
        .grid-item { 
            cursor: pointer; border: 2px solid #2d2d2d; border-radius: 10px; 
            overflow: hidden; position: relative; background: #000; 
            aspect-ratio: 16 / 9; 
            transition: border-color 0.2s;
        }

        /* --- ĐÃ SỬA: Class linh hoạt kích hoạt tỷ lệ 3:4 nếu là video dọc (Shorts/TikTok) --- */
        .grid-item.portrait {
            aspect-ratio: 3 / 4 !important; 
        }

        .grid-item:hover { border-color: #03dac6; }
        
        /* --- ĐÃ SỬA: Ép ảnh lùi về phía sau và lấp đầy khung --- */
        .grid-item img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block; 
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
        }
        
        /* --- ĐÃ SỬA: Ép thanh mốc thời gian luôn nằm trên ảnh, bám chặt đáy ô --- */
        .grid-item .grid-meta { 
            position: absolute; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: rgba(0, 0, 0, 0.85); 
            font-size: 11px; 
            padding: 6px 0; 
            text-align: center; 
            color: #fff;
            display: flex; 
            flex-direction: column; 
            gap: 2px;
            z-index: 2; /* Đảm bảo chữ luôn nổi lên trên, không bao giờ bị đè */
            box-sizing: border-box;
        }



        .grid-meta .grid-label { font-weight: bold; color: #03dac6; text-overflow: ellipsis; white-space: nowrap; overflow: hidden; padding: 0 4px; }
    
   /* --- SỬA TRIỆT ĐỂ: TỐI ƯU GIAO DIỆN MÀN HÌNH NGANG (LANDSCAPE) --- */
@media (orientation: landscape) {
    /* Đảm bảo khoảng đệm dưới chân trang vừa vặn với chiều cao thanh điều khiển */
    body {
        padding-bottom: 70px !important;
    }

    /* Thanh điều khiển chính chia làm 3 phần rõ rệt nằm trên 1 hàng duy nhất */
    .controls {
        flex-direction: row !important;
        justify-content: space-between !important;
        align-items: center !important;
        gap: 12px !important;
        padding: 6px 16px !important;
        height: 56px !important;
        box-sizing: border-box !important;
    }

    /* Khối chứa 3 nút chính (hàng số 1 ban đầu) - Giờ đóng vai trò giữ khoảng trống bên trái nếu cần */
    .controls > .controls-row:nth-child(1) {
        display: none !important; /* Ẩn khối trống này đi để nhường không gian */
    }

    /* Khối trung tâm: Chứa toàn bộ các ô nhập liệu (Cắt từ, Độ dài, Tên đoạn) */
    .controls > .controls-row:nth-child(2) {
        background: transparent !important;
        padding: 0 !important;
        margin: 0 !important;
        width: auto !important;
        flex: 1 !important; /* Tự động chiếm toàn bộ không gian ở giữa */
        display: flex !important;
        justify-content: center !important;
    }

    /* Khử bỏ hoàn toàn kiểu layout dọc cũ của khối bọc trong */
    .controls > .controls-row:nth-child(2) > div {
        flex-direction: row !important; /* Ép dòng Cắt từ và Độ dài nằm ngang */
        flex-wrap: nowrap !important;
        background: #252525 !important; /* Giữ nền xám bo góc bao quanh toàn bộ nhóm input */
        padding: 4px 10px !important;
        gap: 15px !important;
        max-width: none !important;
        width: auto !important;
        align-items: center !important;
        border-radius: 8px !important;
    }

    /* Định hình lại hàng "Cắt từ" và hàng "Độ dài clip" thành các cụm ngang liền mạch */
    .controls > .controls-row:nth-child(2) > div > div {
        flex-direction: row !important;
        align-items: center !important;
        width: auto !important;
        gap: 6px !important;
    }

    /* Thu nhỏ các nhãn văn bản (Label) và chặn không cho xuống dòng */
    .controls > .controls-row:nth-child(2) label {
        width: auto !important;
        text-align: left !important;
        font-size: 0.8em !important;
        white-space: nowrap !important;
    }

    /* Điều chỉnh kích thước các ô nhập dữ liệu để đứng vừa vặn trên một hàng */
    #startTimeInput {
        width: 75px !important;
        padding: 4px 2px !important;
        font-size: 0.85em !important;
    }
    #durationInput {
        width: 32px !important;
        padding: 4px 2px !important;
        font-size: 0.85em !important;
    }
    #clipLabelInput {
        width: 130px !important;
        max-width: 180px !important;
        padding: 4px 6px !important;
        font-size: 0.85em !important;
    }
    .tune-btn {
        padding: 4px 6px !important;
        font-size: 0.75em !important;
    }

    /* Khối bên phải: Chứa 3 nút bấm thao tác (Thêm đoạn, Random, Lưới) */
    .controls > .controls-row:nth-child(3) {
        width: auto !important;
        flex-shrink: 0 !important;
        justify-content: flex-end !important;
        gap: 6px !important;
        flex-wrap: nowrap !important;
    }

    /* Định cấu trúc cố định cho các nút bấm, không cho co giãn bóp méo chữ */
    .controls .action-btn, #gridViewBtn {
        padding: 0 10px !important;
        font-size: 0.8em !important;
        height: 34px !important;
        line-height: 34px !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        flex: unset !important;
        white-space: nowrap !important;
    }

    /* Ẩn hoàn toàn chữ trong nút Lưới để tiết kiệm diện tích tối đa khi xoay ngang */
    #gridViewBtn span {
        display: none !important;
    }
    #gridViewBtn svg {
        margin-right: 0 !important;
    }
}



    /* Chặn chọn văn bản cho tất cả các loại nút bấm */
button, 
.action-btn, 
.tune-btn, 
.delete-btn, 
.download-btn,

#closeGrid {
    -webkit-user-select: none;  /* Safari */

async function checkFileConnection() {

        const { createFFmpeg, fetchFile } = FFmpeg;

            // Hàm kiểm tra xem thiết bị có phải là iPhone, iPad hoặc iPod không
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||

                        async function loadFFmpegCore() {
            const loadingOverlay = document.getElementById('ffmpegLoadingOverlay');
            const loadingStatusText = document.getElementById('loadingStatusText');

            try {
                await ffmpeg.load();
                isFFmpegReady = true;
                status.innerText = "Hệ thống Core đã sẵn sàng! Vui lòng chọn Video.";
                
                if(upload.files[0]) {
                    enableControls();
                }

                // Chờ một nhịp nhỏ 300ms cho mượt rồi ẩn màn hình Loading
                setTimeout(() => {
                    loadingOverlay.classList.add('fade-out');
                }, 300);

            } catch (error) {
                console.error(error);
                status.innerText = "Lỗi khởi tạo Core. Hãy đảm bảo chạy bằng GitHub Pages (HTTPS) hoặc Local Server Cross-Origin.";
                
                // Cập nhật trạng thái lỗi trực tiếp lên màn hình loading để người dùng biết trước
                if (loadingStatusText) {
                    loadingStatusText.innerText = "❌ Lỗi khởi tạo hệ thống xử lý!";
                    loadingStatusText.style.color = "#cf6679"; 
                }

                // CHỨC NĂNG MỚI: Kích hoạt các nút bấm cơ bản để phân đoạn video ngầm (không cần FFmpeg)
                isFFmpegReady = false; // Đảm bảo trạng thái core tắt
                if(upload.files[0] || sharedVideoURL) {
                    enableControls();
                } else {
                    // Nếu chưa chọn file, vẫn mở khóa các nút bấm phụ để khi nạp file vào là chạy được ngay
                    nextBtn.disabled = false;
                    randomBtn.disabled = false;
                    gridViewBtn.disabled = false;
                    nextBtn.innerText = "Thêm đoạn";
                }

                // Bỏ chặn màn hình chờ sau 1.5 giây để người dùng kịp đọc thông báo lỗi rồi vào sử dụng app
                setTimeout(() => {
                    loadingOverlay.classList.add('fade-out');
                    alert("⚠️ Cảnh báo: Không thể nạp thư viện FFmpeg.\nBạn vẫn có thể phân đoạn và xem video bình thường, nhưng tính năng 'Tải Xuống .MP4' sẽ tạm thời không khả dụng.");
                }, 1500);
            }
        }


        loadFFmpegCore();

        durationInput.addEventListener('input', () => {
            const val = durationInput.value || 0;
            randomBtn.innerText = `Random ${val}s`;
        });

        function adjustTime(amount) {
            let currentSeconds = parseTime(startTimeInput.value);
            currentSeconds = Math.max(0, Math.min(totalVideoDuration, currentSeconds + amount));
            startTimeInput.value = formatTime(currentSeconds);
        }

        // Keyboard navigation shortcuts
        window.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName === 'INPUT') return; 
            
            if (e.code === 'Space') {
                e.preventDefault();
                if (currentlyUnmutedVideo) {
                    if (currentlyUnmutedVideo.paused) currentlyUnmutedVideo.play().catch(()=>{});
                    else currentlyUnmutedVideo.pause();
                }
            } else if (e.code === 'ArrowLeft') {
                e.preventDefault();
                adjustTime(-0.1);
            } else if (e.code === 'ArrowRight') {
                e.preventDefault();
                adjustTime(0.1);
            } else if (e.code === 'Enter') {
                e.preventDefault();
                if (!nextBtn.disabled) nextBtn.click();
            }
        });

        const clipObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const video = entry.target;
                if (entry.isIntersecting) {
                    if (video.src && video.src !== "" && video.src !== window.location.href) {
                        video.play().catch(() => {});
                    }
                        } else {
            video.pause();
            if (isIOS) video.muted = true; // Chỉ bật câm trên iPhone khi cuộn qua
            video.volume = 0.001; 
            video.classList.remove('unmuted');
            if (currentlyUnmutedVideo === video) currentlyUnmutedVideo = null;
        }

            });
        }, { threshold: 0.1 });
            
            
            // --- LOGIC NHẤN GIỮ NÚT MŨI TÊN ĐỂ CHẠY NHANH THỜI GIAN (ĐÃ TỐI ƯU ĐỘ NHẠY) ---
let autoTuneInterval = null;
let autoTuneTimeout = null;

function startAutoTune(amount) {
    // 1. Thực hiện ngay lập tức 1 nhịp đầu tiên khi vừa chạm vào để đảm bảo độ nhạy
    adjustTime(amount);

    // 2. Nếu sau 250ms người dùng vẫn chưa buông tay, kích hoạt vòng lặp chạy liên tục (Interval)
    autoTuneTimeout = setTimeout(() => {
        autoTuneInterval = setInterval(() => {
            adjustTime(amount);
        }, 60); // Cứ mỗi 60ms sẽ cộng/trừ thời gian 1 lần (tốc độ mượt mà)
    }, 250);
}

function stopAutoTune() {
    // Dọn dẹp cả bộ đếm chờ lẫn vòng lặp chạy nhanh khi người dùng nhấc tay hoặc di chuột ra ngoài
    if (autoTuneTimeout) clearTimeout(autoTuneTimeout);
    if (autoTuneInterval) clearInterval(autoTuneInterval);
    autoTuneTimeout = null;
    autoTuneInterval = null;
}

// Gán sự kiện trực tiếp ngay lập tức khi file script chạy, đảm bảo bấm là ăn ngay
const btnPrevTime = document.getElementById('btnPrevTime');
const btnNextTime = document.getElementById('btnNextTime');

if (btnPrevTime && btnNextTime) {
    // Sự kiện xử lý cho nút Lùi Thời Gian (<<)
    btnPrevTime.addEventListener('mousedown', (e) => { e.preventDefault(); startAutoTune(-1); });
    btnPrevTime.addEventListener('touchstart', (e) => { e.preventDefault(); startAutoTune(-1); }, { passive: false });

    // Sự kiện xử lý cho nút Tiến Thời Gian (>>)
    btnNextTime.addEventListener('mousedown', (e) => { e.preventDefault(); startAutoTune(1); });
    btnNextTime.addEventListener('touchstart', (e) => { e.preventDefault(); startAutoTune(1); }, { passive: false });

    // Các sự kiện kết thúc hành vi nhấn giữ để dừng chạy thời gian
    window.addEventListener('mouseup', stopAutoTune);
    window.addEventListener('touchend', stopAutoTune);
    
    // Đề phòng trường hợp người dùng rê chuột ra khỏi phạm vi nút bấm khi đang giữ
    btnPrevTime.addEventListener('mouseleave', stopAutoTune);
    btnNextTime.addEventListener('mouseleave', stopAutoTune);
}



        // KHÔI PHỤC HOÀN TOÀN CƠ CHẾ REHYDRATION MƯỢT MÀ CỦA PHIÊN BẢN V1
        function handleClipRehydration() {
            if (rehydrationTimeout) clearTimeout(rehydrationTimeout);
            rehydrationTimeout = setTimeout(() => {
                const allWrappers = Array.from(document.querySelectorAll('.clip-wrapper'));
                if (allWrappers.length === 0) return;
                const viewportHeight = window.innerHeight;
                const visibleIndices = allWrappers.map((wrapper, index) => {
                    const rect = wrapper.getBoundingClientRect();
                    return (rect.top < viewportHeight && rect.bottom > 0) ? index : -1;
                }).filter(idx => idx !== -1);
                if (visibleIndices.length === 0) return;
                const safeStart = Math.max(0, visibleIndices[0] - 3);
                const safeEnd = Math.min(allWrappers.length - 1, visibleIndices[visibleIndices.length - 1] + 3);

                allWrappers.forEach((wrapper, index) => {
                    const video = wrapper.querySelector('video');
                    if (index >= safeStart && index <= safeEnd) {
                        if (!video.src || video.src === "" || video.src === window.location.href) {
                            video.src = sharedVideoURL;
                            video.currentTime = parseFloat(video.dataset.startTime);
                            video.load();
                        }
                    } else {
                        if (video.src && video.src !== "" && video.src !== window.location.href) {
                            video.pause(); video.src = ""; video.load(); 
                        }
                    }
                });
            }, 250);
        }

        window.addEventListener('scroll', handleClipRehydration, { passive: true });

        function setFocusAudio(videoElement) {
    if (currentlyUnmutedVideo && currentlyUnmutedVideo !== videoElement) {
        if (isIOS) currentlyUnmutedVideo.muted = true; // Chỉ ép câm hoàn toàn trên iPhone
        currentlyUnmutedVideo.volume = 0.001; 
        currentlyUnmutedVideo.classList.remove('unmuted');
    }
    if (isIOS) videoElement.muted = false; // Bật lại tiếng trên iPhone
    videoElement.volume = 1.0; 
    videoElement.classList.add('unmuted');
    currentlyUnmutedVideo = videoElement;
}


        function enableControls() {
            if (isFFmpegReady && sharedVideoURL) {
                nextBtn.disabled = false;
                randomBtn.disabled = false;
                gridViewBtn.disabled = false;
                nextBtn.innerText = "Thêm đoạn";
            }
        }

        // --- ĐÃ CẬP NHẬT: TỰ ĐỘNG GIỮ LẠI CÁC ĐOẠN ĐÃ CẮT KHI KẾT NỐI LẠI VIDEO ---
upload.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
        rawVideoFile = file; 
        if (sharedVideoURL) URL.revokeObjectURL(sharedVideoURL); 
        sharedVideoURL = URL.createObjectURL(file);
        
        const tempVideo = document.createElement('video');
        tempVideo.src = sharedVideoURL;
        tempVideo.onloadedmetadata = () => {
            totalVideoDuration = tempVideo.duration;
            
            // Kiểm tra xem trước đó người dùng đã cắt đoạn nào chưa
            const hasExistingClips = videoContainer.children.length > 0;
            
            if (!hasExistingClips) {

                videoContainer.innerHTML = ""; 
                gridContent.innerHTML = "";
                document.body.classList.remove('has-clips');
                
                document.getElementById('mainTitle').innerText = "Video sẵn sàng";
                document.getElementById('mainTitle').style.color = "#2ecc71";
                document.getElementById('subTitle').innerHTML = "💡 Thiết lập mốc thời gian bắt đầu, gán nhãn rồi nhấn <b>Thêm đoạn</b>.";
            } else {
                // TRƯỜNG HỢP 2: Người dùng đang kết nối lại video do bị ngắt RAM
                console.log("🔄 Đang hồi sinh nguồn dữ liệu cho các phân đoạn cũ...");
                
                // Kích hoạt lại toàn bộ các thẻ video cũ trên giao diện với nguồn mới
                const allVideos = videoContainer.querySelectorAll('video');
                allVideos.forEach(video => {
                    const startPos = parseFloat(video.dataset.startTime) || 0;
                    video.src = sharedVideoURL;
                    
                    video.currentTime = startPos;
                    video.load();
                    // Cho phát lại mượt mà nếu danh sách clip đang hiển thị
                    video.play().catch(() => {});
                });
                
                // Cập nhật lại ảnh Thumbnail dạng lưới cho khớp với video mới nạp
                const gridItems = gridContent.querySelectorAll('.grid-item');
                gridItems.forEach(item => {
                    const clipId = item.getAttribute('data-grid-id');
                    const targetWrapper = document.getElementById(clipId);
                    if (targetWrapper) {
                        const targetVideo = targetWrapper.querySelector('video');
                        const startTime = parseFloat(targetVideo.dataset.startTime) || 0;
                        const img = item.querySelector('img');
                        
                        // Chụp lại thumbnail mới thay thế ảnh trống
                        captureThumbnail(startTime).then(thumbUrl => {
                            if (thumbUrl && img) img.src = thumbUrl;
                        });
                    }
                });
                
                // Đảm bảo body giữ nguyên trạng thái hiển thị danh sách
                document.body.classList.add('has-clips');
            }
            
            upload.value = ""; 
            status.innerText = `Thời lượng video: ${formatTime(totalVideoDuration)}`;
            enableControls();
        };
    }
});


                async function captureThumbnail(startTime) {
    return new Promise((resolve) => {
        const canvas = document.createElement('canvas');
        const v = document.createElement('video');
        v.src = sharedVideoURL;
        v.muted = true;
        v.playsInline = true;
        v.preload = "auto";
        
        v.setAttribute('playsinline', '');
        v.setAttribute('webkit-playsinline', '');

        v.onloadedmetadata = () => {
            v.currentTime = startTime;
        };

        v.onseeked = () => {
            setTimeout(() => {
                try {
                    const videoWidth = v.videoWidth || 160;
                    const videoHeight = v.videoHeight || 160;
                    
                    const scale = 160 / Math.max(videoWidth, videoHeight);
                    canvas.width = videoWidth * scale; 
                    canvas.height = videoHeight * scale;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(v, 0, 0, canvas.width, canvas.height);
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
                    
                    // --- ĐÃ TỐI ƯU CHO ANDROID: Ép dọn dẹp luồng chạy ngầm ---
                    v.pause();
                    v.src = "";
                    v.load(); 
                    v.removeAttribute('src'); 
                    v.remove();
                    
                    resolve(dataUrl);
                } catch(e) {
                    console.error("Lỗi vẽ Canvas Thumbnail:", e);
                    resolve("");
                }
            }, 150); 
        };

        v.onerror = () => {
            // --- ĐÃ TỐI ƯU CHO ANDROID ---
            v.pause(); v.src = ""; v.load(); v.removeAttribute('src'); v.remove(); 
            resolve("");
        };

        setTimeout(() => {
            if (v.src) {
                // --- ĐÃ TỐI ƯU CHO ANDROID ---
                v.pause(); v.src = ""; v.load(); v.removeAttribute('src'); v.remove(); 
                resolve("");
            }
        }, 3000);

        v.load();
    });
}




        function addGridItemAhead(clipId, startTime, labelText) {
            const gridItem = document.createElement('div');
            gridItem.className = 'grid-item';
            gridItem.setAttribute('data-grid-id', clipId);
            
            const img = document.createElement('img');
            img.alt = "Thumbnail";
            gridItem.appendChild(img);
            
            const metaContainer = document.createElement('div');
            metaContainer.className = 'grid-meta';
            
            if(labelText) {
                const gridLabel = document.createElement('span');
                gridLabel.className = 'grid-label';
                gridLabel.innerText = labelText;
                metaContainer.appendChild(gridLabel);
            }
            
            const timeSpan = document.createElement('span');
            timeSpan.innerText = formatTime(startTime);
            metaContainer.appendChild(timeSpan);
            
            gridItem.appendChild(metaContainer);
            
            gridItem.onclick = () => {
                gridOverlay.style.display = 'none';
                const targetWrapper = document.getElementById(clipId);
                if (!targetWrapper) return;
                const targetVideo = targetWrapper.querySelector('video');
                targetWrapper.scrollIntoView({ behavior: 'smooth', block: 'center' });
                setTimeout(() => {
                    if (!targetVideo.src || targetVideo.src === "" || targetVideo.src === window.location.href) {
                        targetVideo.src = sharedVideoURL;
                        targetVideo.currentTime = startTime;
                        targetVideo.load();
                    }
                    setFocusAudio(targetVideo);
                    targetVideo.play().catch(() => {});
                }, 400);
            };
            
            gridContent.appendChild(gridItem);

        function formatTime(s) {
            const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = Math.floor(s % 60);
            return [h, m, sec].map(v => String(v).padStart(2, '0')).join(':');
        }
        
        function parseTime(t) {
            const p = t.replace(/[^0-9:]/g, '').split(':').reverse();
            let seconds = 0;
            if (p[0]) seconds += parseInt(p[0]) || 0;     
            if (p[1]) seconds += (parseInt(p[1]) || 0) * 60; 
            if (p[2]) seconds += (parseInt(p[2]) || 0) * 3600; 
            return seconds;
        }
            
            // --- CHẶN HOÀN TOÀN HÀNH VI PULL-TO-REFRESH TRÊN DI ĐỘNG ---
window.addEventListener('touchstart', (e) => {
    // Chỉ can thiệp nếu thao tác vuốt bằng 1 ngón tay
    if (e.touches.length !== 1) return;
    
    const touch = e.touches[0];
    // Lưu lại điểm bắt đầu vuốt theo trục Y
    window.initialTouchY = touch.clientY;
}, { passive: true });

window.addEventListener('touchmove', (e) => {
    if (window.initialTouchY === undefined) return;
    
    const touch = e.touches[0];
    const currentY = touch.clientY;
    const diffY = currentY - window.initialTouchY; // Dương là vuốt xuống, Âm là vuốt lên

    // 1. Nếu đang ở đỉnh trang (scrollTop === 0) và cố tình vuốt xuống để kéo Refresh
    // 2. Hoặc nếu đang ở đáy trang và bị hiện tượng nảy (Overscroll) khi vuốt lên
    if ((document.documentElement.scrollTop === 0 && diffY > 0) || 
        (window.innerHeight + window.pageYOffset >= document.documentElement.scrollHeight && diffY < 0)) {
        
        // Kiểm tra xem vùng cuộn có phải là vùng danh sách lưới (Grid Overlay) hay không
        // Nếu không phải Grid Overlay đang mở, chặn hành vi kéo nảy mặc định của trình duyệt
        if (gridOverlay.style.display !== 'flex') {
            if (e.cancelable) e.preventDefault();
        }
    }
}, { passive: false }); // Bắt buộc phải là false để preventDefault() có tác dụng
            
            // --- CHẶN HOÀN TOÀN HÀNH VI DOUBLE-TAP TO ZOOM VÀ PINCH ZOOM (ZOMM ĐA ĐIỂM) ---

// 1. Chặn Double-tap (Gõ liên tiếp 2 lần) nhưng loại trừ các nút bấm điều khiển
let lastTouchEnd = 0;
document.addEventListener('touchend', (e) => {
    const now = (new Date()).getTime();
    
    // Nếu người dùng đang bấm vào nút mũi tên (.tune-btn) hoặc bất kỳ button nào, 
    // cho phép xử lý tự nhiên, không được preventDefault làm mất độ nhạy.
    if (e.target.closest('button') || e.target.closest('.tune-btn') || e.target.closest('input')) {
        return; 
    }

    if (now - lastTouchEnd <= 300) {
        if (e.cancelable) e.preventDefault(); // Chỉ chặn zoom ở các vùng trống bên ngoài
    }
    lastTouchEnd = now;
}, false);

            // 3. Chặn hoàn toàn Menu ngữ cảnh (Tải xuống/Chia sẻ/In) khi bấm giữ trên Mobile
document.addEventListener('contextmenu', (e) => {
    // Nếu bấm giữ vào ô input, cho phép hiện menu mặc định để người dùng dán/sửa văn bản
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
        return;
    }
    // Chặn menu đối với tất cả các vùng khác (nút bấm, video, nền app)
    e.preventDefault();
}, false);

            
            
async function downloadGifFFmpeg(startTime, duration, labelText, btn) {
    if (!isFFmpegReady) {
        alert("Hệ thống FFmpeg core đang tải, vui lòng thử lại sau vài giây!");
        return;
    }
    if (!rawVideoFile) {
        alert("Lỗi: Không tìm thấy file video đầu vào.");
        return;
    }
    
    // Kiểm tra kết nối tệp tin (Anti-RAM Cleanup trên Android)
    try {
        await rawVideoFile.slice(0, 1).arrayBuffer();
    } catch (fileError) {
        alert("⚠️ Hệ thống đã ngắt kết nối tệp tin để giải phóng RAM.\nVui lòng chọn lại video để tiếp tục trích xuất!");
        upload.value = "";
        upload.click(); 
        return;
    }

    const originalBtnText = btn.innerText;
    btn.disabled = true;
    btn.innerText = '⌛ Tạo GIF...';
    status.innerText = `⏳ Thực thi chuyển đổi GIF [${formatTime(startTime)}] độ dài ${duration}s...`;

    const timestamp = Date.now();
    const cleanFileName = rawVideoFile.name.replace(/\s+/g, '_');
    const virtualInputName = `input_${timestamp}_${cleanFileName}`;
    const outputName = `animated_${timestamp}.gif`;

    try {
        // Nạp file video vào hệ thống file ảo của FFmpeg
        ffmpeg.FS('writeFile', virtualInputName, await fetchFile(rawVideoFile));
        
        // Thực thi dòng lệnh FFmpeg: Trích xuất mốc thời gian, giảm độ phân giải xuống tối đa rộng 480 (giữ nguyên tỷ lệ), ép fps về 12
        await ffmpeg.run(
            '-ss', startTime.toString(), 
            '-t', duration.toString(), 
            '-i', virtualInputName, 
            '-vf', 'fps=12,scale=480:-1:flags=lanczos', 
            outputName
        );
        
        // Đọc dữ liệu GIF từ bộ nhớ ảo
        const data = ffmpeg.FS('readFile', outputName);
        const gifUrl = URL.createObjectURL(new Blob([data.buffer], { type: 'image/gif' }));
        
        const suffix = labelText ? `_${labelText.replace(/[^a-zA-Z0-9]/g, '_')}` : '';
        const downloadName = `clip_${formatTime(startTime).replace(/:/g, '-')}${suffix}.gif`;
        
        // Kích hoạt tiến trình tải xuống tự động
        const a = document.createElement('a');
        a.href = gifUrl;
        a.download = downloadName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        try { ffmpeg.FS('unlink', outputName); } catch(e){}
        status.innerText = `✨ Trích xuất GIF thành công: ${downloadName}`;
    } catch (err) {
        console.error(err);
        alert("Có lỗi xảy ra trong quá trình xử lý Render GIF.");
        status.innerText = "❌ Lỗi thực thi Render GIF.";
    } finally {
        btn.disabled = false;
        btn.innerText = originalBtnText;
        try { ffmpeg.FS('unlink', virtualInputName); } catch(e){}
    }
}
